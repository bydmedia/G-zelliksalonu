<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelleRose - Premium Güzellik & Estetik</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Montserrat', sans-serif; overflow-x: hidden; background-color: #FAFAFA; }
    .font-display { font-family: 'Cormorant Garamond', serif; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

    .text-gold { color: #B8905B; } .bg-gold { background-color: #B8905B; }
    .hover-bg-gold:hover { background-color: #A37B47; } .border-gold { border-color: #B8905B; }
    .ring-gold { --tw-ring-color: #B8905B; }
    
    /* Uçuşan Kalpler */
    .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden; background-color: #FCFBF9; }
    .floating-heart { position: absolute; color: #E5D6C5; opacity: 0; animation: floatHeart linear infinite; }
    @keyframes floatHeart { 
        0% { transform: translate(0, 100vh) scale(0.5) rotate(0deg); opacity: 0; } 
        10% { opacity: 0.15; } 50% { transform: translate(20px, 40vh) scale(1.2) rotate(20deg); opacity: 0.25; } 
        90% { opacity: 0.15; } 100% { transform: translate(-20px, -10vh) scale(0.8) rotate(-20deg); opacity: 0; } 
    }

    /* Kayan Yorumlar */
    .marquee-container { overflow: hidden; white-space: nowrap; position: relative; width: 100%; }
    .marquee-content { display: inline-block; animation: marquee 35s linear infinite; }
    .marquee-content:hover { animation-play-state: paused; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* Admin Grafik Çubuğu (CSS Pseudo-Chart) */
    .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 40px; }
    .bar { background-color: #B8905B; width: 8px; border-radius: 4px 4px 0 0; opacity: 0.8; }
  </style>
</head>
<body class="text-zinc-600 antialiased">

  <div class="hearts-bg" id="hearts-container"></div>
  <div id="app"></div>

  <script>
    // --- SİSTEM DEĞİŞKENLERİ & MOCK VERİLER ---
    const SYSTEM_TODAY = "2026-07-11"; 

    let SERVICES = [
      { id: 1, name: "Elmas Mikrodermabrazyon", category: "Cilt Bakımı", duration: 45, priceMin: 900, priceMax: 1200, icon: "droplet" },
      { id: 2, name: "Diod Lazer Epilasyon", category: "Lazer", duration: 30, priceMin: 700, priceMax: 900, icon: "zap" },
      { id: 3, name: "Kalıcı Oje & Nail Art", category: "Tırnak", duration: 40, priceMin: 400, priceMax: 600, icon: "hand" },
      { id: 4, name: "Keratin Bakım", category: "Saç", duration: 90, priceMin: 1500, priceMax: 2200, icon: "scissors" },
      { id: 5, name: "Altın İğne", category: "Cilt Bakımı", duration: 50, priceMin: 1100, priceMax: 1400, icon: "sparkles" }
    ];

    let STAFF = [
      { id: 1, name: "Elif Yılmaz", title: "Cilt Bakım Uzmanı", tags: [1, 5] },
      { id: 2, name: "Merve Kaya", title: "Lazer Epilasyon Uzmanı", tags: [2] },
      { id: 3, name: "Sena Demir", title: "Tırnak & Nail Art Uzmanı", tags: [3] }
    ];

    let APPOINTMENTS = [
      { id: 101, customer: "Zeynep Arslan", phone: "0532 111 2233", service: "Elmas Mikrodermabrazyon", staff: "Elif Yılmaz", date: "2026-07-11", time: "10:00", status: "Bekliyor" },
      { id: 102, customer: "Merve Şahin", phone: "0555 444 5566", service: "Kalıcı Oje & Nail Art", staff: "Sena Demir", date: "2026-07-11", time: "14:30", status: "Onaylı" },
      { id: 103, customer: "Fatma Gül", phone: "0533 222 1100", service: "Diod Lazer Epilasyon", staff: "Merve Kaya", date: "2026-07-14", time: "16:00", status: "Ertelendi" }
    ];

    let INVENTORY = [
      { id: 1, name: "Hyaluronik Asit Serum", stock: 12, unit: "Şişe", minAlert: 5 },
      { id: 2, name: "Lazer Jeli", stock: 3, unit: "Galon", minAlert: 5 },
      { id: 3, name: "Aseton", stock: 15, unit: "Litre", minAlert: 10 }
    ];

    let TRANSACTIONS = [
      { id: 1, type: "income", source: "appointment", desc: "Altın İğne - Ayşe T.", amount: 1200, method: "Kredi Kartı", date: "2026-07-11" },
      { id: 2, type: "income", source: "extra", desc: "Kozmetik Ürün Satışı", amount: 450, method: "Nakit", date: "2026-07-11" },
      { id: 3, type: "expense", source: "extra", desc: "Aylık Temizlik Malzemesi", amount: 800, method: "Havale", date: "2026-07-11" }
    ];

    const MOCK_REVIEWS = Array.from({length: 30}, (_, i) => {
      const names = ["Ayşe T.", "Merve K.", "Zeynep B.", "Fatma S.", "Elif D.", "Selin Y.", "Büşra A.", "Cansu E.", "Derya Ç.", "Ece N.", "Pelin G.", "İrem M."];
      const texts = ["Harika bir deneyimdi, ambiyans çok şık.", "Personel inanılmaz ilgili ve profesyonel.", "Mekan çok temiz, kullanılan ürünler birinci sınıf.", "Kesinlikle tavsiye ediyorum.", "Sonuçlardan çok memnun kaldım.", "Kendimi kraliçeler gibi hissettirdiler.", "Her şey mükemmeldi, favori mekanım.", "Güler yüzlü hizmet, kaliteli işlemler.", "Artık tek adresim burası.", "Beklediğimden çok daha lüks.", "Tüm çalışanların ellerine sağlık.", "Aldıkları parayı sonuna kadar hak ediyorlar."];
      return { name: names[i % names.length], text: texts[i % texts.length] };
    });

    // --- STATE ---
    let state = {
      mode: window.location.hash === '#admin' ? 'admin' : 'site',
      page: 'home',
      showBooking: false, bookingStep: 0,
      bookingData: { service: null, staff: null, date: null, time: null, name: '', phone: '' },
      adminAuthed: false,
      adminTab: 'overview',
      settingsTab: 'contact',
      modals: { postpone: false, payment: false, addFinance: false, addStock: false },
      activeId: null,
      filters: { aptStaff: '', aptService: '', pastStaff: '', pastService: '', pastDate: '', financeType: 'all' },
      
      contact: {
        phone: '0850 123 45 67', email: 'hello@bellerose.com',
        address: 'Nişantaşı, Teşvikiye Cad. No:12, Şişli/İstanbul',
        instagram: '@bellerose.estetik', facebook: '/bellerose'
      },
      gallery: [
        'https://images.unsplash.com/photo-1600948836101-f9ffda59d250?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1522337660859-02fbefca4702?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1516975080661-46bbf0f4f9f7?auto=format&fit=crop&w=600&q=80'
      ]
    };

    window.addEventListener('hashchange', () => { state.mode = window.location.hash === '#admin' ? 'admin' : 'site'; render(); });

    function initHearts() {
      const container = document.getElementById('hearts-container');
      container.innerHTML = '';
      for(let i=0; i<15; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 15 + 15) + 's';
        heart.style.animationDelay = (Math.random() * 5) + 's';
        heart.style.transform = `scale(${Math.random() * 0.7 + 0.3})`;
        container.appendChild(heart);
      }
    }
    initHearts();

    function formatDate(dateStr) {
      if(!dateStr) return '';
      const parts = dateStr.split('-');
      return parts.length === 3 ? `${parts[2]}.${parts[1]}.${parts[0].slice(2)}` : dateStr;
    }

    function generateBars(count) {
      return Array.from({length: count}).map(() => `<div class="bar" style="height: ${Math.random() * 80 + 20}%"></div>`).join('');
    }

    // --- GLOBAL FONKSİYONLAR ---
    window.setPage = (page) => { state.page = page; window.scrollTo(0,0); render(); };
    window.updateFilter = (field, val) => { state.filters[field] = val; render(); };
    window.handleInput = (field, el) => { state.bookingData[field] = el.value; const btn = document.getElementById('confirm-btn'); if(btn) btn.disabled = !(state.bookingData.name.length > 2 && state.bookingData.phone.length > 9); };

    // Randevu İşlemleri
    window.openBooking = () => { state.showBooking = true; state.bookingStep = 0; state.bookingData = { service: null, staff: null, date: null, time: null, name: '', phone: '' }; render(); };
    window.closeBooking = () => { state.showBooking = false; render(); };
    window.setBookingService = (id) => { state.bookingData.service = SERVICES.find(s => s.id === id); render(); };
    window.setBookingStaff = (id) => { state.bookingData.staff = STAFF.find(s => s.id === id); render(); };
    window.setBookingTime = (time) => { state.bookingData.time = time; state.bookingData.date = SYSTEM_TODAY; render(); };
    window.nextBookingStep = () => { 
      if(state.bookingStep === 3) {
        APPOINTMENTS.push({ id: Date.now(), customer: state.bookingData.name, phone: state.bookingData.phone, service: state.bookingData.service.name, staff: state.bookingData.staff.name, date: state.bookingData.date, time: state.bookingData.time, status: "Bekliyor" });
        state.bookingStep = 4;
      } else { state.bookingStep++; } render(); 
    };
    window.prevBookingStep = () => { if(state.bookingStep > 0) state.bookingStep--; render(); };

    // Admin İşlemleri
    window.loginAdmin = (e) => { e.preventDefault(); state.adminAuthed = true; render(); };
    window.logoutAdmin = () => { state.adminAuthed = false; window.location.hash = '#site'; };
    window.setAdminTab = (tab) => { state.adminTab = tab; render(); };
    window.setSettingsTab = (tab) => { state.settingsTab = tab; render(); };

    // Erteleme
    window.openPostpone = (id) => { state.activeId = id; state.modals.postpone = true; render(); };
    window.savePostpone = (e) => {
      e.preventDefault(); const apt = APPOINTMENTS.find(a => a.id === state.activeId);
      apt.date = document.getElementById('pDate').value; apt.time = document.getElementById('pTime').value; apt.status = "Ertelendi";
      state.modals.postpone = false; render();
    };

    // Ödeme Alma
    window.openPayment = (id) => { state.activeId = id; state.modals.payment = true; render(); };
    window.savePayment = (e) => {
      e.preventDefault(); const apt = APPOINTMENTS.find(a => a.id === state.activeId);
      TRANSACTIONS.push({
        id: Date.now(), type: "income", source: "appointment",
        desc: `${apt.service} - ${apt.customer}`,
        amount: parseFloat(document.getElementById('payAmount').value),
        method: document.getElementById('payMethod').value, date: SYSTEM_TODAY
      });
      apt.status = "Ödendi / Tamamlandı";
      state.modals.payment = false; render();
    };

    // Stok İşlemleri
    window.saveStock = (e) => {
      e.preventDefault();
      INVENTORY.push({ id: Date.now(), name: document.getElementById('iName').value, stock: parseInt(document.getElementById('iStock').value), unit: document.getElementById('iUnit').value, minAlert: parseInt(document.getElementById('iMin').value) });
      state.modals.addStock = false; render();
    };

    // Gelir/Gider Ekleme
    window.saveFinance = (e) => {
      e.preventDefault();
      TRANSACTIONS.push({ id: Date.now(), type: document.getElementById('fType').value, source: "extra", desc: document.getElementById('fDesc').value, amount: parseFloat(document.getElementById('fAmount').value), method: document.getElementById('fMethod').value, date: SYSTEM_TODAY });
      state.modals.addFinance = false; render();
    };

    // Site Ayarları Kaydet
    window.saveContactInfo = (e) => {
      e.preventDefault();
      state.contact = { phone: document.getElementById('cPhone').value, email: document.getElementById('cEmail').value, address: document.getElementById('cAddress').value, instagram: document.getElementById('cInsta').value, facebook: document.getElementById('cFace').value };
      alert("İletişim bilgileri güncellendi!"); render();
    };
    window.saveGalleryInfo = (e) => {
      e.preventDefault();
      state.gallery = [ document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value, document.getElementById('g4').value ];
      alert("Galeri güncellendi!"); render();
    };

    // --- RENDER ---
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = state.mode === 'site' ? renderSite() + (state.showBooking ? renderBookingWizard() : '') : (state.adminAuthed ? renderAdminDashboard() + renderModals() : renderAdminLogin());
      lucide.createIcons();
    }

    // --- SİTE ---
    function renderSite() {
      let content = `
        <header class="fixed top-0 inset-x-0 z-30 bg-white/80 backdrop-blur-lg border-b border-zinc-100 shadow-sm">
          <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <span class="text-2xl text-zinc-900 font-display cursor-pointer font-semibold tracking-wide" onclick="setPage('home')">Belle<span class="text-gold italic">Rose</span></span>
            <button onclick="openBooking()" class="bg-zinc-900 hover:bg-zinc-800 text-white text-sm px-6 py-2.5 rounded-full transition-colors shadow-md font-medium tracking-wide">Randevu Al</button>
          </div>
        </header>
      `;
      
      content += `
        <section class="relative pt-36 pb-20 px-6 text-center">
          <div class="max-w-5xl mx-auto relative z-10">
            <span class="inline-flex items-center gap-2 text-gold text-xs tracking-[0.3em] uppercase mb-4 bg-white/70 px-5 py-2 rounded-full border border-yellow-900/10 shadow-sm font-medium">
              <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Lüks & Premium Bakım
            </span>
            <h1 class="text-5xl md:text-7xl text-zinc-900 leading-tight font-display mb-6">
              Kendinize ayırdığınız<br><span class="italic text-gold">en değerli anlar</span>
            </h1>
            <p class="mt-6 max-w-xl mx-auto text-zinc-500 md:text-lg leading-relaxed">Uzman ellerde, huzur dolu bir atmosferde kişiye özel estetik ve güzellik deneyimi.</p>
            <button onclick="openBooking()" class="mt-10 inline-flex items-center gap-2 bg-gold hover-bg-gold text-white px-10 py-4 rounded-full transition-all shadow-xl font-medium transform hover:-translate-y-1">
              <i data-lucide="calendar" class="w-5 h-5"></i> Hemen Randevu Al
            </button>
          </div>
        </section>

        <!-- Galeri -->
        <section class="px-6 py-20 bg-white/40 backdrop-blur-md border-y border-zinc-100">
          <div class="max-w-6xl mx-auto">
            <div class="mb-14 text-center">
              <span class="text-xs tracking-[0.3em] uppercase text-gold font-medium">Atmosfer</span>
              <h2 class="mt-3 text-3xl md:text-4xl text-zinc-900 font-display">Salonumuzdan Görüntüler</h2>
              <div class="h-px w-20 bg-gold mt-6 mx-auto opacity-50"></div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              ${state.gallery.map(url => `<div class="aspect-square rounded-2xl overflow-hidden shadow-md"><img src="${url}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-500" alt="Galeri"></div>`).join('')}
            </div>
          </div>
        </section>

        <!-- Yorumlar -->
        <section class="py-20 overflow-hidden">
          <div class="mb-10 text-center px-6">
            <h2 class="text-3xl text-zinc-900 font-display">Misafirlerimizin Kaleminden</h2>
            <div class="h-px w-20 bg-gold mt-6 mx-auto opacity-50"></div>
          </div>
          <div class="marquee-container py-4">
            <div class="marquee-content flex gap-6 px-3">
              ${[...MOCK_REVIEWS, ...MOCK_REVIEWS].map(r => `
                <div class="w-80 shrink-0 bg-white border border-zinc-100 rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow">
                  <div class="flex items-center gap-1 text-yellow-400 mb-4">${'<i data-lucide="star" class="w-4 h-4 fill-current"></i>'.repeat(5)}</div>
                  <p class="text-sm text-zinc-600 italic leading-relaxed">"${r.text}"</p>
                  <p class="text-xs text-zinc-400 mt-4 font-semibold uppercase tracking-wider">— ${r.name}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <!-- İletişim -->
        <section class="px-6 py-20 bg-zinc-950 text-zinc-400 border-t border-zinc-800">
          <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12">
            <div>
              <span class="text-2xl text-white font-display font-semibold tracking-wide block mb-6">Belle<span class="text-gold italic">Rose</span></span>
              <p class="text-sm leading-relaxed max-w-sm mb-8">Sektörün öncü teknolojileri ve uzman kadrosuyla, güzelliğinizi taçlandırmak için buradayız.</p>
              <div class="space-y-4 text-sm">
                <p class="flex items-center gap-3"><i data-lucide="phone" class="w-4 h-4 text-gold"></i> ${state.contact.phone}</p>
                <p class="flex items-center gap-3"><i data-lucide="mail" class="w-4 h-4 text-gold"></i> ${state.contact.email}</p>
                <p class="flex items-center gap-3"><i data-lucide="map-pin" class="w-4 h-4 text-gold"></i> ${state.contact.address}</p>
              </div>
            </div>
            <div class="md:text-right flex flex-col md:items-end justify-center">
              <h3 class="text-white font-display text-xl mb-4">Sosyal Medyada Biz</h3>
              <div class="flex items-center gap-6 mb-8">
                <a href="#" class="flex items-center gap-2 hover:text-gold transition-colors"><i data-lucide="instagram" class="w-5 h-5"></i> ${state.contact.instagram}</a>
                <a href="#" class="flex items-center gap-2 hover:text-gold transition-colors"><i data-lucide="facebook" class="w-5 h-5"></i> ${state.contact.facebook}</a>
              </div>
            </div>
          </div>
        </section>
      `;
      return content;
    }

    function renderBookingWizard() {
      let b = '', canNext = false, s = state.bookingStep, d = state.bookingData;
      if (s === 4) return `<div class="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-3xl p-10 max-w-md w-full text-center shadow-2xl"><div class="w-20 h-20 rounded-full bg-green-50 text-green-600 flex items-center justify-center mx-auto mb-6"><i data-lucide="check" class="w-10 h-10"></i></div><h3 class="text-3xl text-zinc-900 font-display mb-3">Randevunuz Oluşturuldu</h3><p class="text-zinc-500 text-sm leading-relaxed">Sayın ${d.name},<br><strong class="text-zinc-800">${d.service.name}</strong> işleminiz için <strong>${formatDate(d.date)} ${d.time}</strong>'da sizi bekliyoruz.</p><button onclick="closeBooking()" class="mt-8 bg-zinc-900 hover:bg-zinc-800 text-white px-8 py-3.5 rounded-full w-full transition-colors font-medium">Kapat</button></div></div>`;
      if (s === 0) { canNext = d.service !== null; b = `<div class="grid sm:grid-cols-2 gap-4">${SERVICES.map(srv => `<button onclick="setBookingService(${srv.id})" class="text-left border rounded-2xl p-5 transition-all ${d.service?.id === srv.id ? 'border-gold bg-yellow-50/50 ring-1 ring-gold' : 'border-zinc-100 hover:border-gold/40'}"><i data-lucide="${srv.icon}" class="w-6 h-6 text-gold mb-3"></i><p class="text-zinc-900 text-lg font-display font-semibold">${srv.name}</p></button>`).join('')}</div>`; }
      else if (s === 1) { canNext = d.staff !== null; const av = d.service ? STAFF.filter(stf => stf.tags.includes(d.service.id)) : STAFF; b = av.length === 0 ? `<p class="text-zinc-500 text-center py-10">Uygun uzman bulunmuyor.</p>` : `<div class="grid sm:grid-cols-2 gap-4">${av.map(stf => `<button onclick="setBookingStaff(${stf.id})" class="text-left border rounded-2xl p-5 flex items-center gap-4 transition-all ${d.staff?.id === stf.id ? 'border-gold bg-yellow-50/50 ring-1 ring-gold' : 'border-zinc-100 hover:border-gold/40'}"><div class="w-12 h-12 rounded-full bg-zinc-100 flex items-center justify-center text-zinc-500"><i data-lucide="user" class="w-6 h-6"></i></div><div><p class="text-zinc-900 text-lg font-display font-semibold">${stf.name}</p><p class="text-xs text-zinc-500 mt-1">${stf.title}</p></div></button>`).join('')}</div>`; }
      else if (s === 2) { canNext = d.time !== null; b = `<div><p class="text-xs uppercase tracking-widest text-zinc-400 mb-4 font-semibold">${formatDate(SYSTEM_TODAY)} - Müsait Saatler</p><div class="grid grid-cols-3 gap-3">${["09:00","10:30","12:00","14:00","15:30","17:00"].map(t => `<button onclick="setBookingTime('${t}')" class="py-3.5 rounded-xl text-sm border transition-all font-medium ${d.time === t ? 'bg-gold border-gold text-white shadow-md' : 'border-zinc-200 text-zinc-600 hover:border-gold'}">${t}</button>`).join('')}</div></div>`; }
      else if (s === 3) { canNext = d.name.length > 2 && d.phone.length > 9; b = `<div class="space-y-5"><div class="bg-zinc-50 rounded-2xl p-5 border border-zinc-100"><p class="font-display text-xl text-zinc-900 mb-1">${d.service.name}</p><p class="text-sm text-zinc-500 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-gold"></i> ${d.staff.name} <span class="mx-1">|</span> <i data-lucide="clock" class="w-4 h-4 text-gold"></i> ${formatDate(SYSTEM_TODAY)} ${d.time}</p></div><div><label class="text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-2 block">Adınız Soyadınız</label><input type="text" oninput="handleInput('name', this)" value="${d.name}" class="w-full border border-zinc-200 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-gold" placeholder="Örn: Ayşe Yılmaz"></div><div><label class="text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-2 block">Telefon Numaranız</label><input type="tel" oninput="handleInput('phone', this)" value="${d.phone}" class="w-full border border-zinc-200 rounded-xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-gold" placeholder="0555 555 55 55"></div></div>`; }
      return `<div class="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center px-4 py-8"><div class="bg-white rounded-[2rem] w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden"><div class="p-6 border-b border-zinc-100 flex items-center justify-between bg-zinc-50/50"><h3 class="text-2xl text-zinc-900 font-display font-semibold">Randevu Oluştur</h3><button onclick="closeBooking()" class="text-zinc-400 hover:text-zinc-700 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button></div><div class="flex px-8 pt-8 gap-3">${["Hizmet", "Uzman", "Zaman", "Onay"].map((l, i) => `<div class="flex-1"><div class="h-1.5 rounded-full ${i <= s ? 'bg-gold' : 'bg-zinc-100'}"></div><p class="text-[10px] mt-2 font-semibold uppercase tracking-wider ${i === s ? 'text-gold' : 'text-zinc-400'}">${l}</p></div>`).join('')}</div><div class="p-8 overflow-y-auto flex-1">${b}</div><div class="p-6 border-t border-zinc-100 flex justify-between bg-zinc-50"><button onclick="prevBookingStep()" class="px-6 py-3 rounded-full text-zinc-500 font-medium ${s === 0 ? 'invisible' : 'hover:bg-zinc-200'}">Geri Dön</button><button id="confirm-btn" onclick="nextBookingStep()" ${!canNext ? 'disabled' : ''} class="bg-zinc-900 hover:bg-zinc-800 disabled:opacity-40 disabled:hover:bg-zinc-900 text-white px-8 py-3 rounded-full transition-colors font-medium">${s === 3 ? 'Onayla' : 'Devam Et'}</button></div></div></div>`;
    }

    // --- ADMİN PANELİ ---
    function renderAdminLogin() {
      return `<div class="min-h-screen bg-zinc-950 flex items-center justify-center px-6 relative z-10"><div class="bg-white rounded-3xl p-10 max-w-sm w-full shadow-2xl"><div class="w-14 h-14 rounded-full bg-yellow-50 text-gold flex items-center justify-center mb-6"><i data-lucide="lock" class="w-6 h-6"></i></div><h2 class="text-3xl text-zinc-900 font-display font-semibold mb-1">Yönetim Paneli</h2><p class="text-sm text-zinc-500 mb-8">Kurumsal Giriş (Herhangi bir bilgiyle girebilirsiniz)</p><form onsubmit="loginAdmin(event)" class="space-y-5"><div><label class="text-xs font-semibold uppercase tracking-wider text-zinc-500 block mb-2">E-posta</label><input type="email" required class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold" placeholder="admin@bellerose.com"></div><div><label class="text-xs font-semibold uppercase tracking-wider text-zinc-500 block mb-2">Şifre</label><input type="password" required class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold" placeholder="••••••••"></div><button type="submit" class="w-full bg-gold hover-bg-gold text-white py-3.5 rounded-xl font-medium transition-colors">Giriş Yap</button></form></div></div>`;
    }

    function renderAdminDashboard() {
      const tabs = [
        { id: 'overview', label: 'Genel Bakış', icon: 'pie-chart' },
        { id: 'appointments', label: 'Randevular', icon: 'calendar' },
        { id: 'finance', label: 'Kasa & Gelir', icon: 'wallet' },
        { id: 'inventory', label: 'Stok Yönetimi', icon: 'package' },
        { id: 'staff', label: 'Uzmanlar', icon: 'users' },
        { id: 'settings', label: 'Site Ayarları', icon: 'settings' }
      ];

      let content = '';
      
      // 1. GENEL BAKIŞ
      if (state.adminTab === 'overview') {
        const todayApts = APPOINTMENTS.filter(a => a.date === SYSTEM_TODAY);
        const todayIncome = TRANSACTIONS.filter(t => t.date === SYSTEM_TODAY && t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const todayExpense = TRANSACTIONS.filter(t => t.date === SYSTEM_TODAY && t.type === 'expense').reduce((s, t) => s + t.amount, 0);
        
        content = `
          <h2 class="text-3xl text-zinc-900 font-display font-semibold mb-8">Genel Bakış</h2>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 border border-zinc-100 shadow-sm">
              <div class="flex justify-between items-start mb-4"><div class="w-10 h-10 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i data-lucide="calendar" class="w-5 h-5"></i></div><div class="bar-chart">${generateBars(6)}</div></div>
              <p class="text-sm text-zinc-500 font-medium uppercase tracking-wider">Bugünün Randevuları</p><p class="text-3xl font-bold text-zinc-900 mt-1">${todayApts.length}</p>
            </div>
            <div class="bg-white rounded-2xl p-6 border border-zinc-100 shadow-sm">
              <div class="flex justify-between items-start mb-4"><div class="w-10 h-10 rounded-full bg-green-50 text-green-500 flex items-center justify-center"><i data-lucide="trending-up" class="w-5 h-5"></i></div><div class="bar-chart">${generateBars(6)}</div></div>
              <p class="text-sm text-zinc-500 font-medium uppercase tracking-wider">Bugünün Cirosu</p><p class="text-3xl font-bold text-zinc-900 mt-1">${todayIncome} ₺</p>
            </div>
            <div class="bg-white rounded-2xl p-6 border border-zinc-100 shadow-sm">
              <div class="flex justify-between items-start mb-4"><div class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center"><i data-lucide="trending-down" class="w-5 h-5"></i></div><div class="bar-chart">${generateBars(6)}</div></div>
              <p class="text-sm text-zinc-500 font-medium uppercase tracking-wider">Toplam Gider</p><p class="text-3xl font-bold text-zinc-900 mt-1">${todayExpense} ₺</p>
            </div>
            <div class="bg-white rounded-2xl p-6 border border-zinc-100 shadow-sm">
              <div class="flex justify-between items-start mb-4"><div class="w-10 h-10 rounded-full bg-yellow-50 text-gold flex items-center justify-center"><i data-lucide="dollar-sign" class="w-5 h-5"></i></div><div class="bar-chart">${generateBars(6)}</div></div>
              <p class="text-sm text-zinc-500 font-medium uppercase tracking-wider">Net Kar</p><p class="text-3xl font-bold text-zinc-900 mt-1">${todayIncome - todayExpense} ₺</p>
            </div>
          </div>
        `;
      } 
      // 2. RANDEVULAR
      else if (state.adminTab === 'appointments') {
        const filteredApts = APPOINTMENTS.filter(a => a.staff.includes(state.filters.aptStaff) && a.service.includes(state.filters.aptService));
        content = `
          <div class="flex items-center justify-between mb-8"><h2 class="text-3xl text-zinc-900 font-display font-semibold">Tüm Randevular</h2></div>
          <div class="flex gap-4 mb-6 bg-white p-4 rounded-xl border border-zinc-100 shadow-sm">
            <select onchange="updateFilter('aptStaff', this.value)" class="border border-zinc-200 rounded-lg px-3 py-2 text-sm focus:outline-none"><option value="">Tüm Uzmanlar</option>${STAFF.map(s => `<option value="${s.name}" ${state.filters.aptStaff===s.name?'selected':''}>${s.name}</option>`).join('')}</select>
            <select onchange="updateFilter('aptService', this.value)" class="border border-zinc-200 rounded-lg px-3 py-2 text-sm focus:outline-none"><option value="">Tüm İşlemler</option>${SERVICES.map(s => `<option value="${s.name}" ${state.filters.aptService===s.name?'selected':''}>${s.name}</option>`).join('')}</select>
          </div>
          <div class="bg-white rounded-2xl border border-zinc-100 shadow-sm overflow-hidden">
            <table class="w-full text-sm text-left"><thead class="bg-zinc-50 text-zinc-500 text-xs uppercase font-semibold border-b border-zinc-100"><tr><th class="px-6 py-4">Tarih/Saat</th><th class="px-6 py-4">Müşteri</th><th class="px-6 py-4">Hizmet / Uzman</th><th class="px-6 py-4">Durum</th><th class="px-6 py-4 text-right">İşlem</th></tr></thead><tbody class="divide-y divide-zinc-50">
                ${filteredApts.map(a => `
                  <tr class="hover:bg-zinc-50/50 transition-colors">
                    <td class="px-6 py-4 text-zinc-600 font-medium">${formatDate(a.date)}<br><span class="text-xs text-zinc-400 font-normal">${a.time}</span></td>
                    <td class="px-6 py-4"><p class="font-semibold text-zinc-800">${a.customer}</p><p class="text-xs text-zinc-500 mt-1">${a.phone}</p></td>
                    <td class="px-6 py-4"><p class="text-zinc-800">${a.service}</p><p class="text-xs text-gold mt-1">${a.staff}</p></td>
                    <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-[11px] uppercase font-bold tracking-wider ${a.status.includes('Ödendi')?'bg-zinc-100 text-zinc-600':a.status==='Onaylı'?'bg-green-100 text-green-700':a.status==='Ertelendi'?'bg-orange-100 text-orange-700':'bg-yellow-100 text-yellow-700'}">${a.status}</span></td>
                    <td class="px-6 py-4 text-right flex gap-2 justify-end">
                      ${!a.status.includes('Ödendi') ? `<button onclick="openPayment(${a.id})" class="text-xs font-semibold text-green-600 hover:text-green-800 bg-green-50 px-3 py-1.5 rounded-lg">Ödeme Al</button>` : ''}
                      ${!a.status.includes('Ödendi') ? `<button onclick="openPostpone(${a.id})" class="text-xs font-semibold text-blue-600 hover:text-blue-800 bg-blue-50 px-3 py-1.5 rounded-lg">Ertele</button>` : ''}
                    </td>
                  </tr>
                `).join('')}
            </tbody></table>
          </div>
        `;
      }
      // 3. KASA & GELİR
      else if (state.adminTab === 'finance') {
        const filteredTrans = state.filters.financeType === 'all' ? TRANSACTIONS : TRANSACTIONS.filter(t => state.filters.financeType === 'apt' ? t.source === 'appointment' : t.type === state.filters.financeType);
        content = `
          <div class="flex items-center justify-between mb-8"><h2 class="text-3xl text-zinc-900 font-display font-semibold">Kasa & Gelir Yönetimi</h2><button onclick="state.modals.addFinance=true; render()" class="bg-zinc-900 text-white px-5 py-2.5 rounded-xl text-sm flex items-center gap-2 font-medium"><i data-lucide="plus" class="w-4 h-4"></i> İşlem Ekle</button></div>
          <div class="flex gap-2 mb-6">
            ${[['all', 'Tüm İşlemler'], ['apt', 'Sadece Randevu Gelirleri'], ['income', 'Tüm Gelirler'], ['expense', 'Giderler']].map(([k,v]) => `<button onclick="updateFilter('financeType', '${k}')" class="px-4 py-2 rounded-lg text-sm font-medium transition-colors ${state.filters.financeType===k?'bg-gold text-white':'bg-white border border-zinc-200 text-zinc-600 hover:border-gold'}">${v}</button>`).join('')}
          </div>
          <div class="bg-white rounded-2xl border border-zinc-100 shadow-sm overflow-hidden">
            <table class="w-full text-sm text-left"><thead class="bg-zinc-50 text-zinc-500 text-xs uppercase font-semibold border-b border-zinc-100"><tr><th class="px-6 py-4">Tarih</th><th class="px-6 py-4">İşlem Açıklaması</th><th class="px-6 py-4">Ödeme Yöntemi</th><th class="px-6 py-4 text-right">Tutar</th></tr></thead><tbody class="divide-y divide-zinc-50">
                ${filteredTrans.map(t => `<tr class="hover:bg-zinc-50/50 transition-colors"><td class="px-6 py-4 text-zinc-600">${formatDate(t.date)}</td><td class="px-6 py-4 font-medium text-zinc-800">${t.desc}</td><td class="px-6 py-4 text-zinc-500">${t.method}</td><td class="px-6 py-4 text-right font-bold ${t.type==='income'?'text-green-600':'text-red-500'}">${t.type==='income'?'+':'-'} ${t.amount} ₺</td></tr>`).join('')}
            </tbody></table>
          </div>
        `;
      }
      // 4. STOK
      else if (state.adminTab === 'inventory') {
        content = `
          <div class="flex items-center justify-between mb-8"><h2 class="text-3xl text-zinc-900 font-display font-semibold">Stok Yönetimi</h2><button onclick="state.modals.addStock=true; render()" class="bg-zinc-900 text-white px-5 py-2.5 rounded-xl text-sm flex items-center gap-2 font-medium"><i data-lucide="plus" class="w-4 h-4"></i> Ürün Ekle</button></div>
          <div class="bg-white rounded-2xl border border-zinc-100 shadow-sm overflow-hidden">
            <table class="w-full text-sm text-left"><thead class="bg-zinc-50 text-zinc-500 text-xs uppercase font-semibold border-b border-zinc-100"><tr><th class="px-6 py-4">Ürün Adı</th><th class="px-6 py-4">Birim</th><th class="px-6 py-4">Mevcut Stok</th><th class="px-6 py-4">Durum</th></tr></thead><tbody class="divide-y divide-zinc-50">
                ${INVENTORY.map(i => `<tr class="hover:bg-zinc-50/50 transition-colors"><td class="px-6 py-4 font-semibold text-zinc-800">${i.name}</td><td class="px-6 py-4 text-zinc-500">${i.unit}</td><td class="px-6 py-4 text-zinc-800 font-bold">${i.stock}</td><td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-[11px] uppercase font-bold tracking-wider ${i.stock <= i.minAlert ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}">${i.stock <= i.minAlert ? 'Kritik Seviye' : 'Yeterli'}</span></td></tr>`).join('')}
            </tbody></table>
          </div>
        `;
      }
      // 5. UZMANLAR
      else if (state.adminTab === 'staff') {
        content = `
          <div class="flex items-center justify-between mb-8"><h2 class="text-3xl text-zinc-900 font-display font-semibold">Uzman Listesi</h2></div>
          <div class="grid md:grid-cols-2 gap-5">${STAFF.map(stf => `<div class="bg-white border border-zinc-100 rounded-2xl p-6 shadow-sm flex items-start gap-5"><div class="w-14 h-14 rounded-full bg-yellow-50 flex items-center justify-center text-gold shrink-0"><i data-lucide="user" class="w-6 h-6"></i></div><div><p class="text-zinc-900 font-display text-2xl font-semibold">${stf.name}</p><p class="text-sm text-gold font-medium mt-1">${stf.title}</p><div class="mt-4 flex flex-wrap gap-2">${stf.tags.map(tagId => SERVICES.find(s => s.id === tagId)?.name).filter(Boolean).map(srv => `<span class="px-2.5 py-1 bg-zinc-100 text-zinc-500 rounded text-[10px] uppercase font-bold tracking-wider">${srv}</span>`).join('')}</div></div></div>`).join('')}</div>
        `;
      }
      // 6. AYARLAR (Site Ayarları)
      else if (state.adminTab === 'settings') {
        content = `
          <h2 class="text-3xl text-zinc-900 font-display font-semibold mb-8">Site Ayarları</h2>
          <div class="flex gap-4 mb-8 border-b border-zinc-200">
            <button onclick="setSettingsTab('contact')" class="px-4 py-3 text-sm font-medium ${state.settingsTab==='contact'?'text-gold border-b-2 border-gold':'text-zinc-500'}">İletişim Bilgileri</button>
            <button onclick="setSettingsTab('gallery')" class="px-4 py-3 text-sm font-medium ${state.settingsTab==='gallery'?'text-gold border-b-2 border-gold':'text-zinc-500'}">Galeri Görüntüleri</button>
          </div>
        `;
        if(state.settingsTab === 'contact') {
          content += `<form onsubmit="saveContactInfo(event)" class="bg-white rounded-2xl p-8 border border-zinc-100 shadow-sm max-w-2xl space-y-5"><div class="grid grid-cols-2 gap-5"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-2">Telefon</label><input id="cPhone" value="${state.contact.phone}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-2">E-posta</label><input id="cEmail" value="${state.contact.email}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"></div></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-2">Adres</label><input id="cAddress" value="${state.contact.address}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"></div><div class="grid grid-cols-2 gap-5"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-2">Instagram</label><input id="cInsta" value="${state.contact.instagram}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-2">Facebook</label><input id="cFace" value="${state.contact.facebook}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"></div></div><button type="submit" class="bg-gold text-white px-8 py-3 rounded-xl font-medium mt-4">Kaydet</button></form>`;
        } else {
          content += `<form onsubmit="saveGalleryInfo(event)" class="bg-white rounded-2xl p-8 border border-zinc-100 shadow-sm max-w-2xl space-y-5"><p class="text-sm text-zinc-500 mb-4">Görsellerin tam bağlantı (URL) adreslerini giriniz.</p><input id="g1" value="${state.gallery[0]}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"><input id="g2" value="${state.gallery[1]}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"><input id="g3" value="${state.gallery[2]}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"><input id="g4" value="${state.gallery[3]}" class="w-full border border-zinc-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-1 focus:ring-gold"><button type="submit" class="bg-gold text-white px-8 py-3 rounded-xl font-medium mt-4">Görselleri Güncelle</button></form>`;
        }
      }

      return `
        <div class="flex bg-[#FAFAFA] min-h-screen relative z-10">
          <aside class="w-72 bg-zinc-950 text-zinc-300 min-h-screen flex flex-col fixed left-0 top-0 shadow-xl z-20 overflow-y-auto">
            <div class="p-8 flex items-center gap-4 border-b border-zinc-800/50"><span class="text-white text-2xl font-display font-semibold tracking-wide">Belle<span class="text-gold italic">Rose</span></span></div>
            <nav class="flex-1 px-4 py-6 space-y-2">
              ${tabs.map(t => `<button onclick="setAdminTab('${t.id}')" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-xl text-sm transition-all ${state.adminTab === t.id ? 'bg-gold/10 text-gold font-medium' : 'hover:bg-zinc-900 hover:text-white'}"><i data-lucide="${t.icon}" class="w-5 h-5"></i> ${t.label}</button>`).join('')}
            </nav>
            <div class="p-6 border-t border-zinc-800/50"><button onclick="logoutAdmin()" class="w-full flex items-center gap-4 px-5 py-3.5 text-sm text-zinc-400 hover:text-white transition-colors rounded-xl hover:bg-zinc-900"><i data-lucide="log-out" class="w-5 h-5"></i> Çıkış Yap</button></div>
          </aside>
          <main class="flex-1 ml-72 p-10 lg:p-14 max-w-7xl pb-20">${content}</main>
        </div>
      `;
    }

    // MODALLAR
    function renderModals() {
      let m = '';
      if(state.modals.postpone) {
        const apt = APPOINTMENTS.find(a => a.id === state.activeId);
        m += `<div class="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-3xl p-8 max-w-sm w-full"><h3 class="text-2xl text-zinc-900 font-display font-semibold mb-2">Randevu Ertele</h3><p class="text-sm text-zinc-500 mb-6">${apt.customer} - ${apt.service}</p><form onsubmit="savePostpone(event)" class="space-y-4"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Yeni Tarih</label><input id="pDate" type="date" required value="${apt.date}" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Yeni Saat</label><input id="pTime" type="time" required value="${apt.time}" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.postpone=false; render()" class="flex-1 py-3 text-sm font-medium bg-zinc-100 rounded-xl hover:bg-zinc-200">İptal</button><button type="submit" class="flex-1 py-3 text-sm font-medium text-white bg-blue-600 rounded-xl hover:bg-blue-700">Ertele</button></div></form></div></div>`;
      }
      if(state.modals.payment) {
        const apt = APPOINTMENTS.find(a => a.id === state.activeId);
        const srv = SERVICES.find(s => s.name === apt.service);
        m += `<div class="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-3xl p-8 max-w-sm w-full"><h3 class="text-2xl text-zinc-900 font-display font-semibold mb-2">Ödeme Al</h3><p class="text-sm text-zinc-500 mb-6">${apt.customer} - ${apt.service}</p><form onsubmit="savePayment(event)" class="space-y-4"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Tahsil Edilen Tutar (₺)</label><input id="payAmount" type="number" required value="${srv ? srv.priceMin : 0}" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Yöntem</label><select id="payMethod" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"><option>Kredi Kartı</option><option>Nakit</option><option>Havale/EFT</option></select></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.payment=false; render()" class="flex-1 py-3 text-sm font-medium bg-zinc-100 rounded-xl">İptal</button><button type="submit" class="flex-1 py-3 text-sm font-medium text-white bg-green-600 rounded-xl">Ödemeyi Al</button></div></form></div></div>`;
      }
      if(state.modals.addStock) {
        m += `<div class="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-3xl p-8 max-w-sm w-full"><h3 class="text-2xl text-zinc-900 font-display font-semibold mb-6">Yeni Ürün Ekle</h3><form onsubmit="saveStock(event)" class="space-y-4"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Ürün Adı</label><input id="iName" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Miktar</label><input id="iStock" type="number" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Birim</label><input id="iUnit" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Kritik Eşik Uyarısı</label><input id="iMin" type="number" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addStock=false; render()" class="flex-1 py-3 text-sm font-medium bg-zinc-100 rounded-xl">İptal</button><button type="submit" class="flex-1 py-3 text-sm font-medium text-white bg-gold rounded-xl">Kaydet</button></div></form></div></div>`;
      }
      if(state.modals.addFinance) {
        m += `<div class="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-3xl p-8 max-w-sm w-full"><h3 class="text-2xl text-zinc-900 font-display font-semibold mb-6">Finansal İşlem Ekle</h3><form onsubmit="saveFinance(event)" class="space-y-4"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">İşlem Türü</label><select id="fType" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"><option value="income">Gelir</option><option value="expense">Gider</option></select></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Açıklama</label><input id="fDesc" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Tutar (₺)</label><input id="fAmount" type="number" required class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"></div><div><label class="text-xs font-semibold text-zinc-500 uppercase block mb-1">Yöntem</label><select id="fMethod" class="w-full border border-zinc-200 rounded-xl px-4 py-2.5"><option>Nakit</option><option>Kredi Kartı</option><option>Havale</option></select></div></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addFinance=false; render()" class="flex-1 py-3 text-sm font-medium bg-zinc-100 rounded-xl">İptal</button><button type="submit" class="flex-1 py-3 text-sm font-medium text-white bg-gold rounded-xl">Kaydet</button></div></form></div></div>`;
      }
      return m;
    }

    render();
  </script>
</body>
</html>
