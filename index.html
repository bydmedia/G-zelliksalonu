<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelleRose - Güzellik Merkezi</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Jost', sans-serif; }
    .font-display { font-family: 'Fraunces', serif; }
    
    /* Özel Kaydırma Çubuğu (Randevu paneli için) */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #fca5a5; border-radius: 10px; }
  </style>
</head>
<body class="bg-white text-stone-600 antialiased">

  <!-- Tüm içeriğin oluşturulacağı ana kapsayıcı -->
  <div id="app"></div>

  <script>
    // --- MOCK VERİLER ---
    const SERVICES = [
      { id: 1, name: "Elmas Mikrodermabrazyon", category: "Cilt Bakımı", duration: 45, priceMin: 900, priceMax: 1200, icon: "droplet" },
      { id: 2, name: "Diod Lazer Epilasyon (Bacak)", category: "Lazer", duration: 30, priceMin: 700, priceMax: 900, icon: "zap" },
      { id: 3, name: "Kalıcı Oje / Manikür", category: "Tırnak", duration: 40, priceMin: 350, priceMax: 450, icon: "hand" },
      { id: 4, name: "Keratin Bakım & Fön", category: "Saç", duration: 90, priceMin: 1500, priceMax: 2200, icon: "scissors" },
      { id: 5, name: "Altın İğne Cilt Bakımı", category: "Cilt Bakımı", duration: 50, priceMin: 1100, priceMax: 1400, icon: "sparkles" }
    ];

    const STAFF = [
      { id: 1, name: "Elif Yılmaz", title: "Cilt Bakım Uzmanı", tags: [1, 5] },
      { id: 2, name: "Merve Kaya", title: "Lazer Epilasyon Uzmanı", tags: [2] },
      { id: 3, name: "Sena Demir", title: "Tırnak & Nail Art Uzmanı", tags: [3] },
      { id: 4, name: "Aylin Çelik", title: "Kuaför / Saç Tasarım", tags: [4] }
    ];

    const APPOINTMENTS = [
      { id: 101, customer: "Zeynep Arslan", service: "Elmas Mikrodermabrazyon", staff: "Elif Yılmaz", date: "2026-07-14", time: "10:00", status: "Onaylı" },
      { id: 102, customer: "Merve Şahin", service: "Kalıcı Oje / Manikür", staff: "Sena Demir", date: "2026-07-14", time: "13:30", status: "Bekliyor" }
    ];

    // --- UYGULAMA DURUMU (STATE) ---
    let state = {
      mode: 'site', // 'site' veya 'admin'
      page: 'home', // 'home', 'services'
      showBooking: false,
      bookingStep: 0,
      bookingData: { service: null, staff: null, date: null, time: null, name: '', phone: '' },
      adminAuthed: false,
      adminTab: 'appointments'
    };

    // --- GLOBAL FONKSİYONLAR ---
    window.setMode = (mode) => { state.mode = mode; render(); };
    window.setPage = (page) => { state.page = page; window.scrollTo(0,0); render(); };
    
    // Randevu Fonksiyonları
    window.openBooking = () => { state.showBooking = true; state.bookingStep = 0; state.bookingData = { service: null, staff: null, date: null, time: null, name: '', phone: '' }; render(); };
    window.closeBooking = () => { state.showBooking = false; render(); };
    window.setBookingService = (id) => { state.bookingData.service = SERVICES.find(s => s.id === id); render(); };
    window.setBookingStaff = (id) => { state.bookingData.staff = STAFF.find(s => s.id === id); render(); };
    window.setBookingTime = (time) => { state.bookingData.time = time; state.bookingData.date = "2026-07-15"; render(); };
    window.nextBookingStep = () => { if(state.bookingStep < 3) state.bookingStep++; else state.bookingStep = 4; render(); };
    window.prevBookingStep = () => { if(state.bookingStep > 0) state.bookingStep--; render(); };
    window.updateForm = (field, val) => { state.bookingData[field] = val; render(); };
    
    // Admin Fonksiyonları
    window.loginAdmin = (e) => { e.preventDefault(); state.adminAuthed = true; render(); };
    window.logoutAdmin = () => { state.adminAuthed = false; render(); };
    window.setAdminTab = (tab) => { state.adminTab = tab; render(); };

    // --- RENDER (EKRANA ÇİZME) İŞLEMLERİ ---
    function render() {
      const app = document.getElementById('app');
      
      let html = `
        <!-- Demo Mod Anahtarı (Sol Üstte) -->
        <div class="fixed top-2 left-1/2 -translate-x-1/2 z-50 bg-stone-800 rounded-full p-1 flex text-xs shadow-lg">
          <button onclick="setMode('site')" class="px-3 py-1 rounded-full ${state.mode === 'site' ? 'bg-white text-stone-800' : 'text-stone-300'} transition-all">Site</button>
          <button onclick="setMode('admin')" class="px-3 py-1 rounded-full ${state.mode === 'admin' ? 'bg-white text-stone-800' : 'text-stone-300'} transition-all">Admin Panel</button>
        </div>
      `;

      if (state.mode === 'site') {
        html += renderSite();
        if (state.showBooking) html += renderBookingWizard();
      } else {
        html += state.adminAuthed ? renderAdminDashboard() : renderAdminLogin();
      }

      app.innerHTML = html;
      
      // Lucide ikonlarını oluştur
      lucide.createIcons();
    }

    // --- SİTE ŞABLONLARI ---
    function renderSite() {
      let content = renderHeader();
      
      if (state.page === 'home') {
        content += `
          <!-- HERO SECTION -->
          <section class="relative bg-gradient-to-b from-rose-50 via-white to-white pt-28 pb-16 px-6 text-center">
            <div class="max-w-5xl mx-auto">
              <span class="inline-flex items-center gap-2 text-rose-400 text-xs tracking-[0.3em] uppercase mb-4">
                <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> Premium Güzellik Deneyimi
              </span>
              <h1 class="text-4xl md:text-6xl text-stone-800 leading-tight font-display">
                Kendinize ayırdığınız<br><span class="italic text-rose-400">en özel zaman</span>
              </h1>
              <p class="mt-6 max-w-xl mx-auto text-stone-500 md:text-lg">Cilt bakımından lazer epilasyona, saçtan tırnağa; uzman ellerde, huzurlu bir atmosferde kişiye özel bakım deneyimi.</p>
              <button onclick="openBooking()" class="mt-8 inline-flex items-center gap-2 bg-rose-300 hover:bg-rose-400 text-white px-8 py-4 rounded-full transition-colors shadow-md shadow-rose-100 font-medium">
                <i data-lucide="calendar" class="w-5 h-5"></i> Hızlı Randevu Al
              </button>
            </div>
          </section>

          <!-- HİZMETLER -->
          <section class="px-6 py-20 bg-white">
            <div class="max-w-6xl mx-auto">
              <div class="mb-12 text-center">
                <span class="text-xs tracking-[0.3em] uppercase text-rose-400">Öne Çıkan Hizmetler</span>
                <h2 class="mt-2 text-3xl md:text-4xl text-stone-800 font-display">Size özel bakım alanları</h2>
                <div class="h-px w-16 bg-amber-200 mt-4 mx-auto"></div>
              </div>
              <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
                ${SERVICES.slice(0,4).map(s => `
                  <div onclick="openBooking()" class="group rounded-2xl border border-stone-100 bg-rose-50/40 p-6 hover:shadow-lg hover:shadow-rose-100 transition-all cursor-pointer">
                    <div class="w-11 h-11 rounded-full bg-white flex items-center justify-center text-rose-400 shadow-sm">
                      <i data-lucide="${s.icon}" class="w-5 h-5"></i>
                    </div>
                    <h3 class="mt-4 text-lg text-stone-800 font-display">${s.name}</h3>
                    <p class="text-xs text-stone-400 mt-1">${s.category} · ${s.duration} dk</p>
                    <p class="text-sm text-rose-400 mt-3 font-medium">${s.priceMin}–${s.priceMax}₺</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;
      } else if (state.page === 'services') {
        content += `
          <section class="px-6 pt-28 pb-20 bg-white min-h-screen">
            <div class="max-w-5xl mx-auto">
              <div class="mb-12 text-center">
                <span class="text-xs tracking-[0.3em] uppercase text-rose-400">Fiyat Listesi</span>
                <h2 class="mt-2 text-3xl md:text-4xl text-stone-800 font-display">Tüm Hizmetlerimiz</h2>
                <div class="h-px w-16 bg-amber-200 mt-4 mx-auto"></div>
              </div>
              <div class="grid sm:grid-cols-2 gap-4">
                ${SERVICES.map(s => `
                  <div class="flex items-center justify-between border border-stone-100 rounded-2xl p-5 hover:border-rose-200 transition-colors">
                    <div class="flex items-center gap-4">
                      <div class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-400"><i data-lucide="${s.icon}" class="w-4 h-4"></i></div>
                      <div>
                        <p class="text-stone-800 font-display">${s.name}</p>
                        <p class="text-xs text-stone-400">${s.duration} dakika</p>
                      </div>
                    </div>
                    <div class="text-right">
                      <p class="text-rose-400 text-sm font-medium">${s.priceMin}–${s.priceMax}₺</p>
                      <button onclick="openBooking()" class="text-xs text-stone-400 underline mt-1 hover:text-rose-400">Randevu al</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </section>
        `;
      }
      
      // WhatsApp Butonu
      content += `
        <a href="https://wa.me/905000000000" target="_blank" class="fixed bottom-6 right-6 z-40 bg-green-500 hover:bg-green-600 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg shadow-green-200 transition-transform hover:scale-105">
          <i data-lucide="message-circle" class="w-7 h-7"></i>
        </a>
      `;
      return content;
    }

    function renderHeader() {
      return `
        <header class="fixed top-0 inset-x-0 z-30 bg-white/80 backdrop-blur border-b border-stone-100">
          <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <span class="text-xl text-stone-800 font-display cursor-pointer" onclick="setPage('home')">Belle<span class="text-rose-400">Rose</span></span>
            <nav class="hidden md:flex items-center gap-6 text-sm text-stone-600">
              <button onclick="setPage('home')" class="hover:text-rose-400 transition-colors ${state.page === 'home' ? 'text-rose-400' : ''}">Ana Sayfa</button>
              <button onclick="setPage('services')" class="hover:text-rose-400 transition-colors ${state.page === 'services' ? 'text-rose-400' : ''}">Hizmetler</button>
            </nav>
            <button onclick="openBooking()" class="bg-rose-300 hover:bg-rose-400 text-white text-sm px-5 py-2 rounded-full transition-colors">Randevu Al</button>
          </div>
        </header>
      `;
    }

    function renderBookingWizard() {
      let bodyHtml = '';
      let canNext = false;
      const s = state.bookingStep;
      const d = state.bookingData;

      if (s === 4) {
        return `
          <div class="fixed inset-0 z-50 bg-stone-800/60 backdrop-blur-sm flex items-center justify-center px-4">
            <div class="bg-white rounded-3xl p-10 max-w-md w-full text-center shadow-2xl animate-fade-in">
              <div class="w-16 h-16 rounded-full bg-green-50 text-green-500 flex items-center justify-center mx-auto"><i data-lucide="check" class="w-8 h-8"></i></div>
              <h3 class="mt-4 text-2xl text-stone-800 font-display">Randevunuz Onaylandı!</h3>
              <p class="mt-2 text-stone-500 text-sm">Sayın ${d.name},<br>${d.service.name} işleminiz için ${d.date} saat ${d.time}'da sizi bekliyoruz.</p>
              <button onclick="closeBooking()" class="mt-8 bg-stone-800 hover:bg-stone-900 text-white px-6 py-3 rounded-xl w-full transition-colors">Kapat</button>
            </div>
          </div>
        `;
      }

      if (s === 0) {
        canNext = d.service !== null;
        bodyHtml = `
          <div class="grid sm:grid-cols-2 gap-3">
            ${SERVICES.map(srv => `
              <button onclick="setBookingService(${srv.id})" class="text-left border rounded-2xl p-4 transition-all ${d.service?.id === srv.id ? 'border-rose-300 bg-rose-50' : 'border-stone-100 hover:border-rose-200'}">
                <i data-lucide="${srv.icon}" class="w-5 h-5 text-rose-400"></i>
                <p class="mt-2 text-stone-800 text-sm font-display">${srv.name}</p>
                <p class="text-xs text-stone-400">${srv.duration} dk · ${srv.priceMin}₺'den başlayan</p>
              </button>
            `).join('')}
          </div>
        `;
      } 
      else if (s === 1) {
        canNext = d.staff !== null;
        const availableStaff = d.service ? STAFF.filter(stf => stf.tags.includes(d.service.id)) : STAFF;
        bodyHtml = `
          <div class="grid sm:grid-cols-2 gap-3">
            ${availableStaff.map(stf => `
              <button onclick="setBookingStaff(${stf.id})" class="text-left border rounded-2xl p-4 flex items-center gap-3 transition-all ${d.staff?.id === stf.id ? 'border-rose-300 bg-rose-50' : 'border-stone-100 hover:border-rose-200'}">
                <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center text-rose-400"><i data-lucide="user" class="w-5 h-5"></i></div>
                <div>
                  <p class="text-stone-800 text-sm font-display">${stf.name}</p>
                  <p class="text-xs text-stone-400">${stf.title}</p>
                </div>
              </button>
            `).join('')}
          </div>
        `;
      }
      else if (s === 2) {
        canNext = d.time !== null;
        const times = ["09:00", "10:00", "11:30", "13:00", "14:30", "16:00"];
        bodyHtml = `
          <div>
            <p class="text-xs uppercase tracking-widest text-stone-400 mb-3">15 Temmuz 2026 - Müsait Saatler</p>
            <div class="grid grid-cols-3 gap-3">
              ${times.map(t => `
                <button onclick="setBookingTime('${t}')" class="py-3 rounded-xl text-sm border transition-all ${d.time === t ? 'bg-rose-300 border-rose-300 text-white' : 'border-stone-100 text-stone-600 hover:border-rose-200'}">
                  ${t}
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }
      else if (s === 3) {
        canNext = d.name.length > 2 && d.phone.length > 9;
        bodyHtml = `
          <div class="space-y-4">
            <div class="bg-rose-50 rounded-xl p-4 text-sm text-stone-600 border border-rose-100">
              <p><strong class="text-stone-800">${d.service.name}</strong> · ${d.staff.name}</p>
              <p class="mt-1 flex items-center gap-1"><i data-lucide="clock" class="w-4 h-4 text-rose-400"></i> ${d.date} — ${d.time}</p>
            </div>
            <div>
              <label class="text-xs text-stone-400 ml-1">Adınız Soyadınız</label>
              <input type="text" value="${d.name}" oninput="updateForm('name', this.value)" class="w-full mt-1 border border-stone-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-200" placeholder="Örn: Ayşe Yılmaz">
            </div>
            <div>
              <label class="text-xs text-stone-400 ml-1">Telefon Numaranız</label>
              <input type="tel" value="${d.phone}" oninput="updateForm('phone', this.value)" class="w-full mt-1 border border-stone-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-200" placeholder="0555 555 55 55">
            </div>
          </div>
        `;
      }

      const steps = ["Hizmet", "Uzman", "Tarih & Saat", "Onay"];

      return `
        <div class="fixed inset-0 z-50 bg-stone-800/60 backdrop-blur-sm flex items-center justify-center px-4 py-8">
          <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
            <!-- Modal Header -->
            <div class="p-6 border-b border-stone-100 flex items-center justify-between shrink-0">
              <h3 class="text-xl text-stone-800 font-display">Randevu Oluştur</h3>
              <button onclick="closeBooking()" class="text-stone-400 hover:text-stone-600 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <!-- Adım Göstergesi -->
            <div class="flex px-6 pt-6 gap-2 shrink-0">
              ${steps.map((label, i) => `
                <div class="flex-1">
                  <div class="h-1.5 rounded-full ${i <= s ? 'bg-rose-300' : 'bg-stone-100'} transition-colors duration-300"></div>
                  <p class="text-[10px] sm:text-xs mt-2 font-medium ${i === s ? 'text-rose-400' : 'text-stone-400'}">${label}</p>
                </div>
              `).join('')}
            </div>

            <!-- İçerik Alanı -->
            <div class="p-6 overflow-y-auto flex-1">
              ${bodyHtml}
            </div>

            <!-- Footer (Butonlar) -->
            <div class="p-6 border-t border-stone-100 flex justify-between shrink-0 bg-gray-50 rounded-b-3xl">
              <button onclick="prevBookingStep()" class="px-5 py-2 rounded-xl text-stone-500 font-medium ${s === 0 ? 'opacity-0 pointer-events-none' : 'hover:bg-stone-200'} transition-colors">Geri</button>
              <button onclick="nextBookingStep()" ${!canNext ? 'disabled' : ''} class="bg-rose-300 hover:bg-rose-400 disabled:opacity-40 disabled:hover:bg-rose-300 text-white px-8 py-3 rounded-xl transition-colors font-medium">
                ${s === 3 ? 'Randevuyu Onayla' : 'Devam Et'}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    // --- ADMİN ŞABLONLARI ---
    function renderAdminLogin() {
      return `
        <div class="min-h-screen bg-stone-900 flex items-center justify-center px-6">
          <div class="bg-white rounded-3xl p-10 max-w-sm w-full shadow-2xl">
            <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-400 flex items-center justify-center mb-4">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </div>
            <h2 class="text-2xl text-stone-800 font-display">Yönetim Paneli</h2>
            <p class="text-sm text-stone-400 mt-1">BelleRose · İşletme Girişi</p>
            <form onsubmit="loginAdmin(event)" class="mt-8 space-y-4">
              <div>
                <label class="text-xs text-stone-400 font-medium ml-1">E-posta</label>
                <input type="email" required class="w-full mt-1 border border-stone-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-200" placeholder="admin@bellerose.com">
              </div>
              <div>
                <label class="text-xs text-stone-400 font-medium ml-1">Şifre</label>
                <input type="password" required class="w-full mt-1 border border-stone-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-200" placeholder="••••••••">
              </div>
              <button type="submit" class="w-full bg-rose-300 hover:bg-rose-400 text-white py-3 rounded-xl transition-colors mt-2 font-medium">Giriş Yap</button>
            </form>
            <p class="text-xs text-stone-400 text-center mt-6">Not: Test için herhangi bir bilgiyle giriş yapabilirsiniz.</p>
          </div>
        </div>
      `;
    }

    function renderAdminDashboard() {
      const tabs = [
        { id: 'appointments', label: 'Randevular', icon: 'calendar-days' },
        { id: 'services', label: 'Hizmetler', icon: 'tag' }
      ];

      let contentHtml = '';
      if (state.adminTab === 'appointments') {
        contentHtml = `
          <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl text-stone-800 font-display">Randevu Yönetimi</h2>
          </div>
          <div class="bg-white rounded-2xl border border-stone-100 overflow-hidden shadow-sm">
            <table class="w-full text-sm text-left">
              <thead class="bg-stone-50 text-stone-400 text-xs uppercase font-medium border-b border-stone-100">
                <tr>
                  <th class="px-6 py-4">Müşteri</th>
                  <th class="px-6 py-4">Hizmet / Uzman</th>
                  <th class="px-6 py-4">Tarih / Saat</th>
                  <th class="px-6 py-4">Durum</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-stone-50">
                ${APPOINTMENTS.map(a => `
                  <tr class="hover:bg-rose-50/30 transition-colors">
                    <td class="px-6 py-4 font-medium text-stone-700">${a.customer}</td>
                    <td class="px-6 py-4 text-stone-500">${a.service}<br><span class="text-xs text-stone-400">${a.staff}</span></td>
                    <td class="px-6 py-4 text-stone-500">${a.date}<br><span class="text-xs text-stone-400">${a.time}</span></td>
                    <td class="px-6 py-4">
                      <span class="px-3 py-1 rounded-full text-xs font-medium ${a.status === 'Onaylı' ? 'bg-green-50 text-green-600' : 'bg-amber-50 text-amber-600'}">${a.status}</span>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      } else {
        contentHtml = `
          <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl text-stone-800 font-display">Hizmet Listesi</h2>
            <button class="bg-stone-800 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2 hover:bg-stone-700 transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> Hizmet Ekle</button>
          </div>
          <div class="grid gap-3">
            ${SERVICES.map(s => `
              <div class="flex items-center justify-between bg-white border border-stone-100 rounded-xl px-6 py-4 shadow-sm hover:border-rose-200 transition-colors">
                <div class="flex items-center gap-4">
                  <div class="w-10 h-10 rounded-full bg-rose-50 flex items-center justify-center text-rose-400"><i data-lucide="${s.icon}" class="w-5 h-5"></i></div>
                  <div>
                    <p class="text-stone-800 font-display">${s.name}</p>
                    <p class="text-xs text-stone-400">${s.category} · ${s.duration} dk</p>
                  </div>
                </div>
                <div class="text-right font-medium text-stone-600">${s.priceMin}-${s.priceMax}₺</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      return `
        <div class="flex bg-stone-50 min-h-screen">
          <!-- Sidebar -->
          <aside class="w-64 bg-stone-900 text-stone-300 min-h-screen flex flex-col fixed left-0 top-0">
            <div class="p-6 flex items-center gap-3 border-b border-stone-800">
              <div class="w-8 h-8 bg-rose-400 rounded-lg flex items-center justify-center text-white"><i data-lucide="layout-dashboard" class="w-4 h-4"></i></div>
              <span class="text-white text-lg font-display">BelleRose</span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
              ${tabs.map(t => `
                <button onclick="setAdminTab('${t.id}')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm transition-colors ${state.adminTab === t.id ? 'bg-rose-400/10 text-rose-300' : 'hover:bg-stone-800'}">
                  <i data-lucide="${t.icon}" class="w-5 h-5"></i> ${t.label}
                </button>
              `).join('')}
            </nav>
            <div class="p-4 border-t border-stone-800">
              <button onclick="logoutAdmin()" class="w-full flex items-center gap-3 px-4 py-3 text-sm text-stone-400 hover:text-white transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i> Çıkış Yap
              </button>
            </div>
          </aside>
          
          <!-- Main Content -->
          <main class="flex-1 ml-64 p-10 max-w-5xl">
            ${contentHtml}
          </main>
        </div>
      `;
    }

    // --- UYGULAMAYI BAŞLAT ---
    render();
  </script>
</body>
</html>
