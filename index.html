<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelleRose - Güzellik & Estetik Merkezi</title>
  
  <!-- Favicon 404 Hatasını Çözen Boş Logo Tanımlaması -->
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; overflow-x: hidden; background-color: #fdf2f8; scroll-behavior: smooth; }
    .font-display { font-family: 'Playfair Display', serif; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .text-primary { color: #db2777; } .bg-primary { background-color: #f43f5e; }
    .hover-bg-primary:hover { background-color: #e11d48; }
    
    .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden; background-color: #fff0f5; }
    .floating-heart { position: absolute; color: #fda4af; opacity: 0; animation: floatHeart linear infinite; }
    @keyframes floatHeart { 
        0% { transform: translate(0, 100vh) scale(0.6) rotate(0deg); opacity: 0; } 
        10% { opacity: 0.6; } 
        50% { transform: translate(30px, 40vh) scale(1.4) rotate(25deg); opacity: 0.8; } 
        90% { opacity: 0.6; } 
        100% { transform: translate(-30px, -10vh) scale(0.8) rotate(-25deg); opacity: 0; } 
    }

    .marquee-container { overflow: hidden; white-space: nowrap; position: relative; width: 100%; }
    .marquee-content { display: inline-block; animation: marquee 40s linear infinite; }
    .marquee-content:hover { animation-play-state: paused; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 32px; }
    .mini-bar { background-color: #db2777; width: 6px; border-radius: 3px 3px 0 0; opacity: 0.7; }
  </style>
</head>
<body class="text-stone-600 antialiased">

  <div class="hearts-bg" id="hearts-container"></div>
  <div id="app"></div>

  <script>
    const SYSTEM_TODAY = "2026-07-12"; 

    // --- SİSTEM SABİTLERİ ---
    const APP_MODULES = [
      { id: 'overview', label: 'Genel Bakış & CRM', icon: 'pie-chart' },
      { id: 'startDay', label: 'Güne Başla', icon: 'sun' },
      { id: 'appointments', label: 'Randevular', icon: 'calendar-heart' },
      { id: 'finance', label: 'Kasa & Gider', icon: 'wallet' },
      { id: 'inventory', label: 'Stok Yönetimi', icon: 'package' },
      { id: 'services', label: 'Hizmetler', icon: 'sparkles' },
      { id: 'staff', label: 'Uzmanlar', icon: 'users' },
      { id: 'settings', label: 'Ayarlar', icon: 'settings-2' }
    ];

    // --- BAŞLANGIÇ VERİLERİ ---
    let defaultUsers = [
      { id: 1, name: "Kurucu / Yönetici", email: "admin@bellerose.com", pass: "bellerose2026", role: "Süper Admin", permissions: ['overview', 'startDay', 'appointments', 'finance', 'inventory', 'services', 'staff', 'settings'] }
    ];

    let defaultServices = [
      { id: 1, name: "Medikal Cilt Bakımı", category: "Cilt", duration: 60, priceMin: 1200, priceMax: 1500, icon: "sparkles", img: "https://images.unsplash.com/photo-1616394584738-fc6e612e71c9?w=600&q=80", desc: "Derinlemesine temizlik ile cildinizi yeniler.", longDesc: "Cildin alt katmanlarına inerek birikmiş kir, yağ ve ölü hücreleri arındırır. Cilt tipinize uygun profesyonel serumlar ve maskeler kullanılarak nem dengesi sağlanır. Gözenekleri sıkılaştırır ve akne oluşumunu engeller." },
      { id: 2, name: "Buz Lazer Epilasyon", category: "Lazer", duration: 45, priceMin: 1800, priceMax: 2200, icon: "zap", img: "https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=600&q=80", desc: "Acısız ve ağrısız kalıcı pürüzsüzlük.", longDesc: "Gelişmiş soğutucu başlığı sayesinde kıl köklerini dondurarak acı hissini ortadan kaldırır. Dört mevsim uygulanabilen bu teknoloji ile istenmeyen tüylere kalıcı olarak veda edersiniz." },
      { id: 3, name: "Kalıcı Oje & Nail Art", category: "Tırnak", duration: 60, priceMin: 600, priceMax: 900, icon: "pen-tool", img: "https://images.unsplash.com/photo-1522337660859-02fbefca4702?w=600&q=80", desc: "Haftalarca bozulmayan kusursuz tırnaklar.", longDesc: "Normal ojelere göre çok daha dayanıklı olan kalıcı oje, UV ışınları ile sabitlenir. Çizilme, soyulma veya matlaşma yapmadan 3-4 hafta boyunca ilk günkü parlaklığını korur." },
      { id: 4, name: "Bölgesel Zayıflama (G5)", category: "Vücut", duration: 40, priceMin: 900, priceMax: 1100, icon: "activity", img: "https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=600&q=80", desc: "Sıkılaşma ve selülit tedavisinde kesin çözüm.", longDesc: "Ritmik masaj ve titreşim yöntemi ile kan akışını hızlandırır. Yağ yakımını destekler, ödem attırır ve özellikle selülitli bölgelerde gözle görülür bir pürüzsüzlük ve sıkılaşma sağlar." },
      { id: 5, name: "İpek Kirpik & Lifting", category: "Göz", duration: 90, priceMin: 800, priceMax: 1200, icon: "eye", img: "https://images.unsplash.com/photo-1512496015851-a1fbbfc69a04?w=600&q=80", desc: "Büyüleyici ve doğal bakışlar.", longDesc: "Kendi kirpiklerinizin uzunluğuna ve yapısına uygun olarak tek tek eklenen ipek kirpikler, maskara kullanmanıza gerek kalmadan yoğun, kıvrık ve derin bakışlara sahip olmanızı sağlar." }
    ];

    let defaultStaff = [
      { id: 1, name: "Elif Yılmaz", title: "Cilt & Güzellik Uzmanı", tags: [1, 5], bio: "Cilt anatomisi ve dermokozmetik alanında 8 yıllık tecrübeye sahip.", img: "https://images.unsplash.com/photo-1595959183082-7b570b7e08e2?w=400&q=80" },
      { id: 2, name: "Merve Kaya", title: "Lazer & Vücut Uzmanı", tags: [2, 4], bio: "Son teknoloji epilasyon ve vücut şekillendirme cihazlarında uzmanlaşmıştır.", img: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400&q=80" }
    ];

    let defaultAppointments = [
      { id: 101, customer: "Zeynep Arslan", phone: "0532 111 2233", service: "Medikal Cilt Bakımı", staff: "Elif Yılmaz", date: "2026-07-12", time: "10:00", status: "Bekliyor", isConfirmed: true },
      { id: 102, customer: "Merve Şahin", phone: "0555 444 5566", service: "Kalıcı Oje & Nail Art", staff: "Elif Yılmaz", date: "2026-07-12", time: "14:30", status: "Bekliyor", isConfirmed: false },
      { id: 103, customer: "Ayşe Yılmaz", phone: "0533 222 1100", service: "Buz Lazer Epilasyon", staff: "Merve Kaya", date: "2026-07-12", time: "16:00", status: "Bekliyor", isConfirmed: false }
    ];

    let defaultInventory = [
      { id: 1, name: "Hyaluronik Asit Serum", stock: 12, unit: "Şişe", minAlert: 5, cost: 450 }
    ];

    let defaultTransactions = [
      { id: 1, type: "income", source: "appointment", desc: "Medikal Cilt Bakımı - Tuğba Y.", amount: 1200, method: "Kredi Kartı", date: "2026-07-12" },
      { id: 2, type: "expense", source: "inventory", desc: "Stok Alımı: Peeling Seti", amount: 900, method: "Havale", date: "2026-07-11" }
    ];

    // --- AKTİF DEĞİŞKENLER ---
    let USERS, SERVICES, STAFF, APPOINTMENTS, INVENTORY, TRANSACTIONS;

    const MOCK_REVIEWS = Array.from({length: 30}, (_, i) => {
      const names = ["Ayşe T.", "Merve K.", "Zeynep B.", "Fatma S.", "Elif D.", "Selin Y.", "Büşra A.", "Cansu E.", "Derya Ç.", "Ece N."];
      const texts = ["Harika bir deneyimdi, ambiyans çok şık.", "Personel inanılmaz zarif.", "Kullanılan ürünler çok kaliteli.", "Kesinlikle tavsiye ediyorum kızlar!", "Sonuçlardan inanılmaz memnun kaldım.", "Kendimi kraliçeler gibi hissettirdiler.", "Her şey mükemmeldi.", "Güler yüzlü hizmet.", "Artık tek adresim burası.", "Beklediğimden çok daha lüks."];
      return { name: names[i % names.length], text: texts[i % texts.length] };
    });

    // --- STATE ---
    let appState = {
      mode: window.location.hash === '#admin' ? 'admin' : 'site',
      page: 'home',
      showBooking: false, bookingStep: 0,
      bookingData: { service: null, staff: null, date: null, time: null, name: '', phone: '' },
      currentUser: null,
      sidebarOpen: false, 
      adminTab: 'overview',
      settingsTab: 'contact',
      modals: { postpone: false, payment: false, addFinance: false, addStock: false, addStaff: false, addUser: false, addService: false, density: false, waConfirm: false, clearHistory: false },
      activeId: null,
      editStaffId: null, tempStaffImg: '',
      editServiceId: null, tempServiceImg: '',
      filters: { aptStaff: '', aptService: '', aptName: '', aptStatus: 'all', aptSort: 'asc', financeType: 'all', financeDate: 'all' },
      densities: {}, 
      contact: { phone: '0850 123 45 67', whatsapp: '905555555555', email: 'hello@bellerose.com', address: 'Side Mah. Liman Cad. No:12, Manavgat/Antalya', instagram: '@bellerose.estetik', facebook: '/bellerose' },
      gallery: [
        'https://images.unsplash.com/photo-1600948836101-f9ffda59d250?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1522337660859-02fbefca4702?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1516975080661-46bbf0f4f9f7?auto=format&fit=crop&w=600&q=80'
      ]
    };

    // --- LOCAL STORAGE ---
    function loadData() {
        try {
            const saved = localStorage.getItem('belleRoseData_v5');
            if (saved) {
                const data = JSON.parse(saved);
                USERS = data.USERS || defaultUsers; SERVICES = data.SERVICES || defaultServices;
                STAFF = data.STAFF || defaultStaff; APPOINTMENTS = data.APPOINTMENTS || defaultAppointments;
                INVENTORY = data.INVENTORY || defaultInventory; TRANSACTIONS = data.TRANSACTIONS || defaultTransactions;
                if(data.contact) appState.contact = data.contact;
                if(data.gallery) appState.gallery = data.gallery;
                if(data.densities) appState.densities = data.densities;
            } else { throw new Error("No data"); }
        } catch(e) {
            USERS = defaultUsers; SERVICES = defaultServices; STAFF = defaultStaff; 
            APPOINTMENTS = defaultAppointments; INVENTORY = defaultInventory; TRANSACTIONS = defaultTransactions;
            saveData();
        }
    }
    
    function saveData() {
        localStorage.setItem('belleRoseData_v5', JSON.stringify({
            USERS, SERVICES, STAFF, APPOINTMENTS, INVENTORY, TRANSACTIONS, 
            contact: appState.contact, gallery: appState.gallery, densities: appState.densities
        }));
    }

    window.addEventListener('hashchange', () => { appState.mode = window.location.hash === '#admin' ? 'admin' : 'site'; render(); });

    function initHearts() {
      const container = document.getElementById('hearts-container');
      if(!container) return;
      container.innerHTML = '';
      for(let i=0; i<25; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 15 + 10) + 's';
        heart.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(heart);
      }
    }

    // YARDIMCI FONKSİYONLAR
    function formatDate(dateStr) {
      if(!dateStr) return ''; const parts = dateStr.split('-');
      return parts.length === 3 ? `${parts[2]}.${parts[1]}.${parts[0].slice(2)}` : dateStr;
    }
    function getDateDiffDays(date1, date2) {
      const d1 = new Date(date1); d1.setHours(0,0,0,0);
      const d2 = new Date(date2); d2.setHours(0,0,0,0);
      return Math.floor(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24));
    }
    function generateBars() {
      return Array.from({length: 5}).map(() => `<div class="mini-bar" style="height: ${Math.random() * 24 + 8}px"></div>`).join('');
    }
    function formatPhoneForWA(phone) {
      if(!phone) return ''; let p = phone.replace(/\D/g, '');
      if(p.startsWith('0')) return '9' + p; if(!p.startsWith('90')) return '90' + p; return p;
    }

    // --- EVENT HANDLERS ---
    window.setPage = (page) => { appState.page = page; window.scrollTo(0,0); render(); };
    window.updateFilter = (field, val) => { appState.filters[field] = val; render(); };
    window.handleInput = (field, el) => { appState.bookingData[field] = el.value; const btn = document.getElementById('confirm-btn'); if(btn) btn.disabled = !(appState.bookingData.name.length > 2 && appState.bookingData.phone.length > 9); };

    // Randevu Sihirbazı
    window.openBooking = () => { appState.showBooking = true; appState.bookingStep = 0; appState.bookingData = { service: null, staff: null, date: null, time: null, name: '', phone: '' }; render(); };
    window.closeBooking = () => { appState.showBooking = false; render(); };
    window.setBookingService = (id) => { appState.bookingData.service = SERVICES.find(s => s.id === id); render(); };
    window.setBookingStaff = (id) => { appState.bookingData.staff = STAFF.find(s => s.id === id); render(); };
    window.setBookingTime = (time) => { appState.bookingData.time = time; appState.bookingData.date = SYSTEM_TODAY; render(); };
    window.nextBookingStep = () => { 
      if(appState.bookingStep === 3) {
        APPOINTMENTS.push({ id: Date.now(), customer: appState.bookingData.name, phone: appState.bookingData.phone, service: appState.bookingData.service.name, staff: appState.bookingData.staff.name, date: appState.bookingData.date, time: appState.bookingData.time, status: "Bekliyor", isConfirmed: false });
        saveData(); appState.bookingStep = 4;
      } else { appState.bookingStep++; } render(); 
    };
    window.prevBookingStep = () => { if(appState.bookingStep > 0) appState.bookingStep--; render(); };

    // Admin & Yetkilendirme
    window.loginAdmin = (e) => { 
      e.preventDefault(); 
      const email = document.getElementById('adminEmail').value; 
      const pass = document.getElementById('adminPass').value; 
      const user = USERS.find(u => u.email === email && u.pass === pass);
      if(user) { appState.currentUser = user; appState.adminTab = user.permissions[0]; render(); } 
      else alert('Hatalı E-posta veya Şifre girdiniz.'); 
    };
    window.logoutAdmin = () => { appState.currentUser = null; window.location.hash = '#site'; };
    window.setAdminTab = (tab) => { appState.adminTab = tab; render(); };
    window.setSettingsTab = (tab) => { appState.settingsTab = tab; render(); };
    window.toggleSidebar = () => { appState.sidebarOpen = !appState.sidebarOpen; render(); };

    window.cancelAppointment = (id) => { if(confirm("Randevuyu iptal etmek istediğinize emin misiniz?")) { APPOINTMENTS.find(a => a.id === id).status = "İptal Edildi"; saveData(); render(); } };
    window.deleteAppointment = (id) => { if(confirm("Bu randevuyu kalıcı olarak silmek istediğinize emin misiniz?")) { APPOINTMENTS = APPOINTMENTS.filter(a => a.id !== id); saveData(); render(); } };
    window.openPostpone = (id) => { appState.activeId = id; appState.modals.postpone = true; render(); };
    window.savePostpone = (e) => { e.preventDefault(); const apt = APPOINTMENTS.find(a => a.id === appState.activeId); apt.date = document.getElementById('pDate').value; apt.time = document.getElementById('pTime').value; apt.status = "Zamanı Değiştirildi"; appState.modals.postpone = false; saveData(); render(); };
    
    window.savePayment = (e) => { 
      e.preventDefault(); const apt = APPOINTMENTS.find(a => a.id === appState.activeId); 
      const amount = parseFloat(document.getElementById('payAmount').value);
      TRANSACTIONS.push({ id: Date.now(), type: "income", source: "appointment", desc: `${document.getElementById('payDesc').value} - ${apt.customer}`, amount: amount, method: document.getElementById('payMethod').value, date: SYSTEM_TODAY }); 
      apt.status = "Ödendi / Tamamlandı"; appState.modals.payment = false; saveData(); render(); 
    };

    window.clearAppointmentHistory = (e) => {
        e.preventDefault(); const range = document.getElementById('clearRange').value;
        let start = null, end = null; const today = new Date(SYSTEM_TODAY); today.setHours(0,0,0,0);
        if (range === '1d') { start = new Date(today); end = new Date(today); }
        else if (range === '3d') { start = new Date(today); start.setDate(start.getDate()-3); end = new Date(today); }
        else if (range === '1w') { start = new Date(today); start.setDate(start.getDate()-7); end = new Date(today); }
        else if (range === '1m') { start = new Date(today); start.setDate(start.getDate()-30); end = new Date(today); }
        else if (range === 'custom') {
            const sVal = document.getElementById('clearStart').value; const eVal = document.getElementById('clearEnd').value;
            if(!sVal || !eVal) return alert("Lütfen özel tarih aralığı seçin.");
            start = new Date(sVal); end = new Date(eVal);
        }
        if(!start || !end) return;
        start.setHours(0,0,0,0); end.setHours(23,59,59,999);
        if(confirm('Belirtilen aralıktaki tüm randevular silinecek. Onaylıyor musunuz?')) {
            APPOINTMENTS = APPOINTMENTS.filter(a => { const d = new Date(a.date); d.setHours(12,0,0,0); return d < start || d > end; });
            saveData(); appState.modals.clearHistory = false; render();
        }
    };

    window.setDensity = (srvId, level) => { appState.densities[srvId] = level; saveData(); render(); }; 
    window.confirmClient = (id, willAttend) => {
      if(willAttend) { APPOINTMENTS.find(a => a.id === id).isConfirmed = true; alert("Teyit edildi!"); } 
      else { APPOINTMENTS = APPOINTMENTS.filter(a => a.id !== id); alert("Randevu silindi."); }
      saveData(); render();
    };

    // Kayıt İşlemleri
    window.saveStock = (e) => { e.preventDefault(); const stock = parseInt(document.getElementById('iStock').value); const cost = parseFloat(document.getElementById('iCost').value); const name = document.getElementById('iName').value; INVENTORY.push({ id: Date.now(), name, stock, unit: document.getElementById('iUnit').value, minAlert: parseInt(document.getElementById('iMin').value), cost }); const totalCost = stock * cost; if(totalCost > 0) TRANSACTIONS.push({ id: Date.now(), type: 'expense', source: 'inventory', desc: `Stok Alımı: ${name}`, amount: totalCost, method: 'Banka İşlemi', date: SYSTEM_TODAY }); appState.modals.addStock = false; saveData(); render(); };
    window.saveFinance = (e) => { e.preventDefault(); TRANSACTIONS.push({ id: Date.now(), type: document.getElementById('fType').value, source: "extra", desc: document.getElementById('fDesc').value, amount: parseFloat(document.getElementById('fAmount').value), method: document.getElementById('fMethod').value, date: SYSTEM_TODAY }); appState.modals.addFinance = false; saveData(); render(); };
    window.saveContactInfo = (e) => { e.preventDefault(); appState.contact = { phone: document.getElementById('cPhone').value, whatsapp: document.getElementById('cWa').value, email: document.getElementById('cEmail').value, address: document.getElementById('cAddress').value, instagram: document.getElementById('cInsta').value, facebook: document.getElementById('cFace').value }; alert("İletişim bilgileri güncellendi!"); saveData(); render(); };
    window.saveGalleryInfo = (e) => { e.preventDefault(); appState.gallery = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value, document.getElementById('g4').value]; alert("Galeri güncellendi!"); saveData(); render(); };
    window.saveUser = (e) => { e.preventDefault(); const perms = Array.from(document.querySelectorAll('.perm-checkbox:checked')).map(cb => cb.value); if(perms.length === 0) return alert("Yetki vermelisiniz."); USERS.push({ id: Date.now(), name: document.getElementById('newUName').value, email: document.getElementById('newUEmail').value, pass: document.getElementById('newUPass').value, role: "Personel", permissions: perms }); appState.modals.addUser = false; saveData(); render(); };
    window.updateProfile = (e) => { e.preventDefault(); const p = document.getElementById('myPass').value; if(p.length > 2) { appState.currentUser.pass = p; alert("Şifre güncellendi!"); saveData(); } };

    // UZMAN İŞLEMLERİ 
    window.openAddStaff = () => { appState.editStaffId = null; appState.tempStaffImg = ''; appState.modals.addStaff = true; render(); };
    window.openEditStaff = (id) => { appState.editStaffId = id; const stf = STAFF.find(s => s.id === id); appState.tempStaffImg = stf.img || ''; appState.modals.addStaff = true; render(); };
    window.deleteStaff = (id) => { if(confirm('Uzmanı silmek istediğinize emin misiniz?')) { STAFF = STAFF.filter(s => s.id !== id); saveData(); render(); } };
    window.handleStaffImage = (e) => { const file = e.target.files[0]; if (file) { const r = new FileReader(); r.onload = (ev) => { appState.tempStaffImg = ev.target.result; document.getElementById('staffImgPreview').src = ev.target.result; }; r.readAsDataURL(file); } };
    window.saveStaff = (e) => {
      e.preventDefault();
      const tags = Array.from(document.querySelectorAll('.service-checkbox:checked')).map(cb => parseInt(cb.value));
      if(tags.length === 0) return alert("En az bir uzmanlık alanı seçin.");
      const imgData = appState.tempStaffImg || 'https://images.unsplash.com/photo-1595959183082-7b570b7e08e2?w=400&q=80';
      if (appState.editStaffId) {
          const stf = STAFF.find(s => s.id === appState.editStaffId);
          stf.name = document.getElementById('newStaffName').value; stf.title = document.getElementById('newStaffTitle').value; 
          stf.bio = document.getElementById('newStaffBio').value; stf.tags = tags; stf.img = imgData;
      } else {

    function renderAdminDashboard() {
      const allowedPages = APP_MODULES.filter(t => appState.currentUser.permissions.includes(t.id));
      let dashContent = '';

      if (appState.adminTab === 'overview') {
        const todayApts = APPOINTMENTS.filter(a => a.date === SYSTEM_TODAY);
        const income = TRANSACTIONS.filter(t => t.date === SYSTEM_TODAY && t.type === 'income').reduce((s, t) => s + t.amount, 0);
        const expense = TRANSACTIONS.filter(t => t.date === SYSTEM_TODAY && t.type === 'expense').reduce((s, t) => s + t.amount, 0);
        
        const crmMap = {};
        APPOINTMENTS.filter(a => a.status.includes('Tamamlandı') || a.status.includes('Ödendi')).forEach(a => {
            if(!crmMap[a.phone]) crmMap[a.phone] = { name: a.customer, phone: a.phone, count: 0, spent: 0, lastVisit: a.date };
            crmMap[a.phone].count++;
            if(a.date > crmMap[a.phone].lastVisit) crmMap[a.phone].lastVisit = a.date;
        });

        <div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4">
          <div class="bg-white rounded-[2rem] p-8 max-w-2xl w-full">
            <h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">${isEdit ? 'Uzmanı Düzenle' : 'Yeni Uzman Ekle'}</h3>
            <form onsubmit="saveStaff(event)" class="space-y-5">
              <div class="flex flex-col sm:flex-row gap-6 items-center sm:items-start mb-4">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-rose-50 shrink-0">
                  <img id="staffImgPreview" src="${currentImg}" class="w-full h-full object-cover">
                </div>
                <div class="flex-1 w-full">
                  <label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Profil Fotoğrafı Seçin</label>
                  <input type="file" accept=".jpg, .jpeg, .png" onchange="handleStaffImage(event)" class="w-full text-sm text-stone-500 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-rose-50 file:text-primary hover:file:bg-rose-100 cursor-pointer">
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Ad Soyad</label><input id="newStaffName" required type="text" value="${stf ? stf.name : ''}" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50 text-sm"></div>
                <div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Unvan / Meslek</label><input id="newStaffTitle" required type="text" value="${stf ? stf.title : ''}" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50 text-sm"></div>
              </div>
              <div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Uzman Biyografisi (Bio)</label><textarea id="newStaffBio" required rows="3" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50 text-sm resize-none" placeholder="Müşterilere gösterilecek açıklama...">${stf ? (stf.bio||'') : ''}</textarea></div>
              <div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-3">Uzmanlık Alanları (Hizmet Seçimi)</label>
                <div class="grid grid-cols-2 gap-3 p-5 bg-rose-50/50 rounded-2xl border border-rose-100 max-h-32 overflow-y-auto">
                  ${SERVICES.map(s => `<label class="flex items-center gap-3 text-sm text-stone-700 cursor-pointer"><input type="checkbox" value="${s.id}" class="service-checkbox w-4 h-4 accent-primary" ${(stf && stf.tags.includes(s.id)) ? 'checked' : ''}> ${s.name}</label>`).join('')}
                </div>
              </div>
              <div class="flex gap-3 mt-6"><button type="button" onclick="appState.modals.addStaff=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-primary rounded-2xl shadow-md">Kaydet</button></div>
            </form>
          </div>
        </div>`;
      }
      if(appState.modals.addUser) {
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-lg w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">Personel Hesabı Oluştur</h3><form onsubmit="saveUser(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Kullanıcı Adı</label><input id="newUName" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Giriş E-postası</label><input id="newUEmail" required type="email" class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Şifre</label><input id="newUPass" required type="text" class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-3">Erişim İzinleri (Sayfalar)</label><div class="grid grid-cols-2 gap-3 p-5 bg-rose-50/50 rounded-2xl border border-rose-100">${APP_MODULES.map(t => `<label class="flex items-center gap-3 text-sm text-stone-700 cursor-pointer"><input type="checkbox" value="${t.id}" class="perm-checkbox w-4 h-4 accent-rose-500"> ${t.label}</label>`).join('')}</div></div><div class="flex gap-3 mt-6"><button type="button" onclick="appState.modals.addUser=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-stone-800 rounded-2xl shadow-md">Oluştur</button></div></form></div></div>`;
      }
      if(appState.modals.clearHistory) {
        m += `
          <div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4">
            <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full">
              <div class="flex items-center justify-between mb-4"><h3 class="text-2xl text-stone-800 font-display font-semibold flex items-center gap-2"><i data-lucide="trash-2" class="w-6 h-6 text-red-500"></i> Geçmişi Sil</h3><button onclick="appState.modals.clearHistory=false; render()" class="text-stone-400 hover:text-primary"><i data-lucide="x" class="w-5 h-5"></i></button></div>
              <p class="text-xs text-stone-500 mb-6">Sistemden kalıcı olarak silinecek randevu aralığını seçin. Bu işlem geri alınamaz.</p>
              <form onsubmit="clearAppointmentHistory(event)" class="space-y-4">
                <div>
                  <label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Silinecek Tarih Aralığı</label>
                  <select id="clearRange" onchange="document.getElementById('customDates').style.display = this.value === 'custom' ? 'grid' : 'none'" class="w-full border border-stone-200 rounded-2xl px-5 py-3 focus:ring-1 focus:ring-primary bg-stone-50 text-sm outline-none">
                    <option value="1d">Son 1 Gün (Bugün)</option>
                    <option value="3d">Son 3 Gün</option>
                    <option value="1w">Son 1 Hafta</option>
                    <option value="1m">Son 1 Ay</option>
                    <option value="custom">Özel Tarih Aralığı Seç</option>
                  </select>
                </div>
                <div id="customDates" style="display: none;" class="grid-cols-2 gap-3 p-4 bg-rose-50/50 rounded-2xl border border-rose-100">
                  <div><label class="text-[10px] font-semibold text-stone-500 uppercase block mb-1">Başlangıç</label><input type="date" id="clearStart" class="w-full border border-stone-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-primary"></div>
                  <div><label class="text-[10px] font-semibold text-stone-500 uppercase block mb-1">Bitiş</label><input type="date" id="clearEnd" class="w-full border border-stone-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-primary"></div>
                </div>
                <div class="flex gap-3 mt-6"><button type="button" onclick="appState.modals.clearHistory=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-red-500 hover:bg-red-600 rounded-2xl shadow-md transition-colors">Kalıcı Sil</button></div>
              </form>
            </div>
          </div>
        `;
      }
      if(appState.modals.density) {
        m += `
          <div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4">
            <div class="bg-white rounded-[2rem] p-8 max-w-lg w-full">
              <div class="flex items-center justify-between mb-6"><h3 class="text-2xl text-stone-800 font-display font-semibold">Randevu Yoğunluğu</h3><button onclick="appState.modals.density=false; render()" class="text-stone-400 hover:text-primary"><i data-lucide="x" class="w-5 h-5"></i></button></div>
              <p class="text-sm text-stone-500 mb-6 bg-rose-50 p-4 rounded-xl border border-rose-100">
                Aynı saat diliminde bir hizmet için kaç kişinin online randevu alabileceğini belirleyin.<br><br>
                <strong class="text-emerald-600">Sakin:</strong> Aynı saate 3 randevu<br>
                <strong class="text-orange-500">Orta:</strong> Aynı saate 2 randevu<br>
                <strong class="text-red-500">Yoğun:</strong> Aynı saate 1 randevu
              </p>
              <div class="space-y-4 max-h-72 overflow-y-auto pr-2">
                ${SERVICES.map(s => `
                  <div class="border border-stone-200 rounded-2xl p-4 flex flex-col gap-3">
                    <p class="font-semibold text-stone-800 text-sm">${s.name}</p>
                    <div class="flex gap-2">
                      <button onclick="setDensity(${s.id}, 3)" class="flex-1 py-2 text-xs font-semibold rounded-xl transition-colors ${(appState.densities[s.id]||1)===3?'bg-emerald-500 text-white':'bg-stone-100 text-stone-500'}">Sakin (3)</button>
                      <button onclick="setDensity(${s.id}, 2)" class="flex-1 py-2 text-xs font-semibold rounded-xl transition-colors ${(appState.densities[s.id]||1)===2?'bg-orange-500 text-white':'bg-stone-100 text-stone-500'}">Orta (2)</button>
                      <button onclick="setDensity(${s.id}, 1)" class="flex-1 py-2 text-xs font-semibold rounded-xl transition-colors ${(appState.densities[s.id]||1)===1?'bg-red-500 text-white':'bg-stone-100 text-stone-500'}">Yoğun (1)</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }
      if(appState.modals.waConfirm) {
        const unconfirmed = APPOINTMENTS.filter(a => a.status === 'Bekliyor' && !a.isConfirmed);
        m += `
          <div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4">
            <div class="bg-white rounded-[2rem] p-8 max-w-lg w-full">
              <div class="flex items-center justify-between mb-4"><h3 class="text-xl text-stone-800 font-display font-semibold flex items-center gap-2"><i data-lucide="message-circle" class="w-6 h-6 text-emerald-500"></i> WhatsApp Teyit Yönetimi</h3><button onclick="appState.modals.waConfirm=false; render()" class="text-stone-400 hover:text-primary"><i data-lucide="x" class="w-5 h-5"></i></button></div>
              <p class="text-sm text-stone-500 mb-6 bg-emerald-50 p-4 rounded-xl border border-emerald-100 text-emerald-800">
                Müşterilerinize tek tıkla WhatsApp üzerinden teyit mesajı gönderin ve aldığınız yanıta göre durumu manuel olarak güncelleyin.
              </p>
              <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                ${unconfirmed.length === 0 ? '<p class="text-center text-stone-400 py-10 font-medium">Teyit bekleyen randevu bulunmuyor.</p>' : unconfirmed.map(a => `
                  <div class="bg-white border border-stone-200 rounded-2xl p-5 shadow-sm">
                    <p class="text-sm text-stone-800 font-semibold">${a.customer} <span class="text-xs text-stone-400 font-normal ml-2">${a.phone}</span></p>
                    <p class="text-xs text-primary font-medium mt-1">${a.date} ${a.time} - ${a.service}</p>
                    <div class="flex gap-2 mt-4">
                      <a href="https://wa.me/${formatPhoneForWA(a.phone)}?text=${encodeURIComponent(`Merhaba ${a.customer.split(' ')[0]} Hanım, BelleRose Güzellik Merkezi'nden ulaşıyoruz. ${a.date} ${a.time} tarihindeki ${a.service} randevunuzu teyit etmek için bu mesaja dönüş yapabilirsiniz. Sevgiler!`)}" target="_blank" class="flex-1 bg-emerald-500 text-white flex justify-center items-center gap-1.5 text-xs font-semibold py-2.5 rounded-xl hover:bg-emerald-600 transition-colors">
                        <i data-lucide="message-circle" class="w-4 h-4"></i> Mesaj At
                      </a>
                      <button onclick="confirmClient(${a.id}, true)" class="flex-1 bg-blue-500 text-white text-xs font-semibold py-2.5 rounded-xl hover:bg-blue-600 transition-colors">Teyit Edildi</button>
                      <button onclick="confirmClient(${a.id}, false)" class="flex-1 bg-white border border-stone-200 text-red-500 text-xs font-semibold py-2.5 rounded-xl hover:bg-red-50 transition-colors">İptal (Sil)</button>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }
      return m;
    }

    // Uygulamayı Başlat
    loadData();
    render();
  </script>
</body>
</html>
