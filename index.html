<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BelleRose - Güzellik & Estetik</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Zarif ve Feminen Fontlar: Playfair Display (Başlıklar) & Poppins (Metinler) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; overflow-x: hidden; background-color: #fdf2f8; }
    .font-display { font-family: 'Playfair Display', serif; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #fda4af; border-radius: 10px; }

    .text-primary { color: #db2777; } .bg-primary { background-color: #f43f5e; }
    .hover-bg-primary:hover { background-color: #e11d48; }
    
    /* Uçuşan Kalpler */
    .hearts-bg { position: fixed; inset: 0; pointer-events: none; z-index: -1; overflow: hidden; background-color: #fff0f5; }
    .floating-heart { position: absolute; color: #fda4af; opacity: 0; animation: floatHeart linear infinite; }
    @keyframes floatHeart { 
        0% { transform: translate(0, 100vh) scale(0.6) rotate(0deg); opacity: 0; } 
        10% { opacity: 0.5; } 
        50% { transform: translate(30px, 40vh) scale(1.4) rotate(25deg); opacity: 0.7; } 
        90% { opacity: 0.5; } 
        100% { transform: translate(-30px, -10vh) scale(0.8) rotate(-25deg); opacity: 0; } 
    }

    /* Kayan Yorumlar */
    .marquee-container { overflow: hidden; white-space: nowrap; position: relative; width: 100%; }
    .marquee-content { display: inline-block; animation: marquee 35s linear infinite; }
    .marquee-content:hover { animation-play-state: paused; }
    @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    
    /* Dinamik Grafik Çubukları */
    .mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 32px; }
    .mini-bar { background-color: #db2777; width: 6px; border-radius: 3px 3px 0 0; opacity: 0.7; }
  </style>
</head>
<body class="text-stone-600 antialiased">

  <div class="hearts-bg" id="hearts-container"></div>
  <div id="app"></div>

  <script>
    // --- SİSTEM DEĞİŞKENLERİ ---
    const SYSTEM_TODAY = "2026-07-11"; 

    // --- MOCK VERİLER ---
    let USERS = [
      { id: 1, name: "Kurucu / Yönetici", email: "admin@bellerose.com", pass: "bellerose2026", role: "Süper Admin", permissions: ['overview', 'startDay', 'appointments', 'finance', 'inventory', 'services', 'staff', 'settings'] },
      { id: 2, name: "Ceren (Resepsiyon)", email: "ceren@bellerose.com", pass: "1234", role: "Personel", permissions: ['startDay', 'appointments'] }
    ];

    let SERVICES = [
      { id: 1, name: "Medikal Cilt Bakımı", category: "Cilt Bakımı", duration: 60, priceMin: 1200, priceMax: 1500, icon: "sparkles" },
      { id: 2, name: "Buz Lazer Tüm Vücut", category: "Lazer", duration: 45, priceMin: 1800, priceMax: 2200, icon: "zap" },
      { id: 3, name: "Kalıcı Oje & İpek Kirpik", category: "Güzellik", duration: 90, priceMin: 800, priceMax: 1200, icon: "eye" }
    ];

    let STAFF = [
      { id: 1, name: "Elif Yılmaz", title: "Cilt Bakım Uzmanı", tags: [1] },
      { id: 2, name: "Merve Kaya", title: "Lazer & Güzellik Uzmanı", tags: [2, 3] }
    ];

    let APPOINTMENTS = [
      { id: 101, customer: "Zeynep Arslan", phone: "0532 111 2233", service: "Medikal Cilt Bakımı", staff: "Elif Yılmaz", date: "2026-07-11", time: "10:00", status: "Bekliyor" },
      { id: 102, customer: "Merve Şahin", phone: "0555 444 5566", service: "Kalıcı Oje & İpek Kirpik", staff: "Merve Kaya", date: "2026-07-11", time: "14:30", status: "Bekliyor" },
      { id: 103, customer: "Ayşe Yılmaz", phone: "0533 222 1100", service: "Buz Lazer Tüm Vücut", staff: "Merve Kaya", date: "2026-07-11", time: "16:00", status: "Bekliyor" }
    ];

    let INVENTORY = [
      { id: 1, name: "Hyaluronik Asit Serum", stock: 12, unit: "Şişe", minAlert: 5, cost: 450 }
    ];

    let TRANSACTIONS = [
      { id: 1, type: "income", source: "appointment", desc: "Medikal Cilt Bakımı - Zeynep A.", amount: 1200, method: "Kredi Kartı", date: "2026-07-11" },
      { id: 2, type: "income", source: "appointment", desc: "Kalıcı Oje - Merve Ş.", amount: 800, method: "Nakit", date: "2026-07-11" },
      { id: 3, type: "expense", source: "inventory", desc: "Stok Alımı: Serum Takviyesi", amount: 900, method: "Havale", date: "2026-07-11" }
    ];

    const MOCK_REVIEWS = Array.from({length: 30}, (_, i) => {
      const names = ["Ayşe T.", "Merve K.", "Zeynep B.", "Fatma S.", "Elif D.", "Selin Y.", "Büşra A.", "Cansu E.", "Derya Ç.", "Ece N."];
      const texts = ["Harika bir deneyimdi, ambiyans çok şık.", "Personel inanılmaz zarif.", "Kullanılan ürünler çok kaliteli.", "Kesinlikle tavsiye ediyorum kızlar!", "Sonuçlardan inanılmaz memnun kaldım.", "Kendimi kraliçeler gibi hissettirdiler.", "Her şey mükemmeldi.", "Güler yüzlü hizmet.", "Artık tek adresim burası.", "Beklediğimden çok daha lüks."];
      return { name: names[i % names.length], text: texts[i % texts.length] };
    });

    // --- STATE ---
    let state = {
      mode: window.location.hash === '#admin' ? 'admin' : 'site',
      page: 'home',
      showBooking: false, bookingStep: 0,
      bookingData: { service: null, staff: null, date: null, time: null, name: '', phone: '' },
      currentUser: null,
      adminTab: 'overview',
      settingsTab: 'contact',
      modals: { postpone: false, payment: false, addFinance: false, addStock: false, addStaff: false, addUser: false, addService: false },
      activeId: null,
      filters: { aptStaff: '', aptService: '', aptName: '', financeType: 'all', financeDate: 'all' },
      
      contact: { phone: '0850 123 45 67', email: 'hello@bellerose.com', address: 'Nişantaşı Cad. No:12, Şişli/İstanbul', instagram: '@bellerose.estetik', facebook: '/bellerose' },
      gallery: [
        'https://images.unsplash.com/photo-1600948836101-f9ffda59d250?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1522337660859-02fbefca4702?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1516975080661-46bbf0f4f9f7?auto=format&fit=crop&w=600&q=80'
      ]
    };

    window.addEventListener('hashchange', () => { state.mode = window.location.hash === '#admin' ? 'admin' : 'site'; render(); });

    function initHearts() {
      const container = document.getElementById('hearts-container');
      container.innerHTML = '';
      for(let i=0; i<18; i++) {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 12 + 10) + 's';
        heart.style.animationDelay = (Math.random() * 5) + 's';
        container.appendChild(heart);
      }
    }
    initHearts();

    function formatDate(dateStr) {
      if(!dateStr) return ''; const parts = dateStr.split('-');
      return parts.length === 3 ? `${parts[2]}.${parts[1]}.${parts[0].slice(2)}` : dateStr;
    }

    function getDateDiffDays(date1, date2) {
      const d1 = new Date(date1); const d2 = new Date(date2);
      return Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24));
    }

    function generateBars() {
      return Array.from({length: 5}).map(() => `<div class="mini-bar" style="height: ${Math.random() * 24 + 8}px"></div>`).join('');
    }

    // --- GLOBAL FONKSİYONLAR ---
    window.setPage = (page) => { state.page = page; window.scrollTo(0,0); render(); };
    window.updateFilter = (field, val) => { state.filters[field] = val; render(); };
    window.handleInput = (field, el) => { state.bookingData[field] = el.value; const btn = document.getElementById('confirm-btn'); if(btn) btn.disabled = !(state.bookingData.name.length > 2 && state.bookingData.phone.length > 9); };

    // Randevu Sihirbazı
    window.openBooking = () => { state.showBooking = true; state.bookingStep = 0; state.bookingData = { service: null, staff: null, date: null, time: null, name: '', phone: '' }; render(); };
    window.closeBooking = () => { state.showBooking = false; render(); };
    window.setBookingService = (id) => { state.bookingData.service = SERVICES.find(s => s.id === id); render(); };
    window.setBookingStaff = (id) => { state.bookingData.staff = STAFF.find(s => s.id === id); render(); };
    window.setBookingTime = (time) => { state.bookingData.time = time; state.bookingData.date = SYSTEM_TODAY; render(); };
    window.nextBookingStep = () => { 
      if(state.bookingStep === 3) {
        APPOINTMENTS.push({ id: Date.now(), customer: state.bookingData.name, phone: state.bookingData.phone, service: state.bookingData.service.name, staff: state.bookingData.staff.name, date: state.bookingData.date, time: state.bookingData.time, status: "Bekliyor" });
        state.bookingStep = 4;
      } else { state.bookingStep++; } render(); 
    };
    window.prevBookingStep = () => { if(state.bookingStep > 0) state.bookingStep--; render(); };

    // Admin & Yetkilendirme
    window.loginAdmin = (e) => { 
      e.preventDefault(); 
      const email = document.getElementById('adminEmail').value; 
      const pass = document.getElementById('adminPass').value; 
      const user = USERS.find(u => u.email === email && u.pass === pass);
      if(user) { state.currentUser = user; state.adminTab = user.permissions[0]; render(); } 
      else alert('Hatalı E-posta veya Şifre girdiniz.'); 
    };
    window.logoutAdmin = () => { state.currentUser = null; window.location.hash = '#site'; };
    window.setAdminTab = (tab) => { state.adminTab = tab; render(); };
    window.setSettingsTab = (tab) => { state.settingsTab = tab; render(); };

    // Randevu Yönetimi
    window.completeAppointment = (id) => {
      const apt = APPOINTMENTS.find(a => a.id === id);
      apt.status = "Tamamlandı";
      alert("İşlem başarıyla tamamlandı olarak işaretlendi!"); render();
    };
    window.cancelAppointment = (id) => {
      if(confirm("Bu randevuyu iptal etmek istediğinize emin misiniz?")) {
        APPOINTMENTS.find(a => a.id === id).status = "İptal Edildi"; render();
      }
    };
    window.openPostpone = (id) => { state.activeId = id; state.modals.postpone = true; render(); };
    window.savePostpone = (e) => {
      e.preventDefault(); const apt = APPOINTMENTS.find(a => a.id === state.activeId);
      apt.date = document.getElementById('pDate').value; apt.time = document.getElementById('pTime').value; apt.status = "Zamanı Değiştirildi";
      state.modals.postpone = false; render();
    };

    window.savePayment = (e) => {
      e.preventDefault(); const apt = APPOINTMENTS.find(a => a.id === state.activeId);
      TRANSACTIONS.push({ id: Date.now(), type: "income", source: "appointment", desc: `${apt.service} - ${apt.customer}`, amount: parseFloat(document.getElementById('payAmount').value), method: document.getElementById('payMethod').value, date: SYSTEM_TODAY });
      apt.status = "Ödendi / Bitti"; state.modals.payment = false; render();
    };

    // Stok & Hizmet
    window.saveStock = (e) => {
      e.preventDefault();
      const stock = parseInt(document.getElementById('iStock').value); const cost = parseFloat(document.getElementById('iCost').value);
      INVENTORY.push({ id: Date.now(), name: document.getElementById('iName').value, stock, unit: document.getElementById('iUnit').value, minAlert: parseInt(document.getElementById('iMin').value), cost });
      const totalCost = stock * cost;
      if(totalCost > 0) TRANSACTIONS.push({ id: Date.now(), type: 'expense', source: 'inventory', desc: `Stok Alımı: ${document.getElementById('iName').value}`, amount: totalCost, method: 'Banka İşlemi', date: SYSTEM_TODAY });
      state.modals.addStock = false; render();
    };

    window.saveService = (e) => {
      e.preventDefault();
      SERVICES.push({ id: Date.now(), name: document.getElementById('sName').value, category: document.getElementById('sCat').value, duration: parseInt(document.getElementById('sDur').value), priceMin: parseInt(document.getElementById('sMin').value), priceMax: parseInt(document.getElementById('sMax').value), icon: "sparkles" });
      state.modals.addService = false; render();
    };
    window.deleteService = (id) => {
      if(confirm("Bu hizmeti sistemden tamamen silmek istediğinize emin misiniz?")) {
        SERVICES = SERVICES.filter(s => s.id !== id); render();
      }
    };

    window.saveStaff = (e) => {
      e.preventDefault();
      const tags = Array.from(document.querySelectorAll('.service-checkbox:checked')).map(cb => parseInt(cb.value));
      if(tags.length === 0) return alert("En az bir uzmanlık alanı seçin.");
      STAFF.push({ id: Date.now(), name: document.getElementById('newStaffName').value, title: document.getElementById('newStaffTitle').value, tags });
      state.modals.addStaff = false; render();
    };

    // Finans & Ayarlar
    window.saveFinance = (e) => {
      e.preventDefault();
      TRANSACTIONS.push({ id: Date.now(), type: document.getElementById('fType').value, source: "extra", desc: document.getElementById('fDesc').value, amount: parseFloat(document.getElementById('fAmount').value), method: document.getElementById('fMethod').value, date: SYSTEM_TODAY });
      state.modals.addFinance = false; render();
    };

    window.saveContactInfo = (e) => {
      e.preventDefault();
      state.contact = { phone: document.getElementById('cPhone').value, email: document.getElementById('cEmail').value, address: document.getElementById('cAddress').value, instagram: document.getElementById('cInsta').value, facebook: document.getElementById('cFace').value };
      alert("İletişim bilgileri başarıyla güncellendi!"); render();
    };
    window.saveGalleryInfo = (e) => {
      e.preventDefault();
      state.gallery = [ document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value, document.getElementById('g4').value ];
      alert("Galeri görselleri güncellendi!"); render();
    };

    window.saveUser = (e) => {
      e.preventDefault();
      const perms = Array.from(document.querySelectorAll('.perm-checkbox:checked')).map(cb => cb.value);
      if(perms.length === 0) return alert("Kullanıcıya en az bir sayfa yetkisi vermelisiniz.");
      USERS.push({ id: Date.now(), name: document.getElementById('newUName').value, email: document.getElementById('newUEmail').value, pass: document.getElementById('newUPass').value, role: "Personel", permissions: perms });
      state.modals.addUser = false; render();
    };

    window.updateProfile = (e) => {
      e.preventDefault();
      const p = document.getElementById('myPass').value;
      if(p.length > 2) { state.currentUser.pass = p; alert("Şifreniz başarıyla güncellendi!"); }
    };

    // --- RENDER ---
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = state.mode === 'site' ? renderSite() + (state.showBooking ? renderBookingWizard() : '') : (state.currentUser ? renderAdminDashboard() + renderModals() : renderAdminLogin());
      lucide.createIcons();
    }

    // --- SİTE ---
    function renderSite() {
      return `
        <header class="fixed top-0 inset-x-0 z-30 glass-panel border-b border-rose-100 shadow-sm">
          <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <span class="text-3xl text-primary font-display cursor-pointer tracking-wide" onclick="setPage('home')">Belle<span class="italic text-rose-300">Rose</span></span>
            <button onclick="openBooking()" class="bg-primary hover-bg-primary text-white text-sm px-7 py-3 rounded-full transition-colors shadow-md font-medium">Randevu Al</button>
          </div>
        </header>

        <section class="relative pt-40 pb-20 px-6 text-center">
          <div class="max-w-4xl mx-auto relative z-10">
            <span class="inline-flex items-center gap-2 text-primary text-xs tracking-[0.2em] uppercase mb-6 bg-rose-50 px-5 py-2 rounded-full border border-rose-100 font-medium shadow-sm">
              <i data-lucide="sparkles" class="w-4 h-4"></i> Güzelliğinize Zarafet Katın
            </span>
            <h1 class="text-5xl md:text-7xl text-stone-800 leading-tight font-display mb-6">Aynadaki yansımanıza <br><span class="italic text-primary">aşık olacaksınız</span></h1>
            <p class="mt-6 max-w-xl mx-auto text-stone-500 md:text-lg leading-relaxed">Kendinizi uzman ellere bırakın. Size özel tasarlanmış premium güzellik deneyimini keşfedin.</p>
            <button onclick="openBooking()" class="mt-10 inline-flex items-center gap-2 bg-primary hover-bg-primary text-white px-10 py-4 rounded-full transition-all shadow-xl font-medium transform hover:scale-105"><i data-lucide="calendar-heart" class="w-5 h-5"></i> Hemen Randevu Oluştur</button>
          </div>
        </section>

        <!-- Galeri -->
        <section class="px-6 py-20 bg-white/50 backdrop-blur-sm border-y border-rose-50">
          <div class="max-w-6xl mx-auto">
            <div class="mb-14 text-center">
              <span class="text-xs tracking-[0.2em] uppercase text-primary font-medium">Atmosferimiz</span>
              <h2 class="mt-3 text-3xl md:text-4xl text-stone-800 font-display">Salonumuzdan Kareler</h2>
              <div class="h-px w-16 bg-rose-300 mt-6 mx-auto opacity-50"></div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
              ${state.gallery.map(url => `<div class="aspect-[4/5] rounded-3xl overflow-hidden shadow-sm"><img src="${url}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700" alt="Galeri"></div>`).join('')}
            </div>
          </div>
        </section>

        <!-- Yorumlar -->
        <section class="py-20 overflow-hidden relative">
          <div class="mb-10 text-center px-6">
            <h2 class="text-3xl text-stone-800 font-display">Mutlu Kadınlar Kulübü</h2>
            <div class="h-px w-16 bg-rose-300 mt-6 mx-auto opacity-50"></div>
          </div>
          <div class="marquee-container py-4">
            <div class="marquee-content flex gap-6 px-3">
              ${[...MOCK_REVIEWS, ...MOCK_REVIEWS].map(r => `
                <div class="w-80 shrink-0 bg-white border border-rose-50 rounded-[2rem] p-8 shadow-sm">
                  <div class="flex items-center gap-1 text-rose-300 mb-4">${'<i data-lucide="star" class="w-4 h-4 fill-current"></i>'.repeat(5)}</div>
                  <p class="text-sm text-stone-600 italic leading-relaxed">"${r.text}"</p>
                  <p class="text-xs text-primary mt-5 font-medium uppercase tracking-widest">— ${r.name}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <!-- İletişim -->
        <section class="px-6 py-20 bg-stone-900 text-stone-400">
          <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-12">
            <div>
              <span class="text-3xl text-white font-display font-semibold tracking-wide block mb-6">Belle<span class="text-rose-400 italic">Rose</span></span>
              <p class="text-sm leading-relaxed max-w-sm mb-8">Zarafetiniz, bizim uzmanlığımız. Sizi salonumuzda ağırlamaktan mutluluk duyarız.</p>
              <div class="space-y-4 text-sm">
                <p class="flex items-center gap-4"><div class="w-8 h-8 rounded-full bg-rose-900/30 flex items-center justify-center"><i data-lucide="phone" class="w-4 h-4 text-rose-400"></i></div> ${state.contact.phone}</p>
                <p class="flex items-center gap-4"><div class="w-8 h-8 rounded-full bg-rose-900/30 flex items-center justify-center"><i data-lucide="map-pin" class="w-4 h-4 text-rose-400"></i></div> ${state.contact.address}</p>
              </div>
            </div>
            <div class="md:text-right flex flex-col md:items-end justify-center">
              <h3 class="text-white font-display text-2xl mb-6">Bizi Takip Edin</h3>
              <div class="flex items-center gap-6">
                <a href="#" class="flex items-center gap-2 hover:text-rose-400 transition-colors"><i data-lucide="instagram" class="w-6 h-6"></i> ${state.contact.instagram}</a>
                <a href="#" class="flex items-center gap-2 hover:text-rose-400 transition-colors"><i data-lucide="facebook" class="w-6 h-6"></i> ${state.contact.facebook}</a>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderBookingWizard() {
      let b = '', canNext = false, s = state.bookingStep, d = state.bookingData;
      if (s === 4) return `<div class="fixed inset-0 z-50 bg-stone-900/40 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-10 max-w-md w-full text-center shadow-2xl"><div class="w-20 h-20 rounded-full bg-rose-50 text-primary flex items-center justify-center mx-auto mb-6"><i data-lucide="heart-handshake" class="w-10 h-10"></i></div><h3 class="text-3xl text-stone-800 font-display mb-3">Randevunuz Alındı</h3><p class="text-stone-500 text-sm leading-relaxed">Sayın ${d.name},<br><strong class="text-stone-800">${d.service.name}</strong> işleminiz için <strong>${formatDate(d.date)} ${d.time}</strong>'da sizi bekliyoruz.</p><button onclick="closeBooking()" class="mt-8 bg-primary hover-bg-primary text-white px-8 py-3.5 rounded-full w-full transition-colors font-medium">Harika, Teşekkürler!</button></div></div>`;
      if (s === 0) { canNext = d.service !== null; b = `<div class="grid sm:grid-cols-2 gap-4">${SERVICES.map(srv => `<button onclick="setBookingService(${srv.id})" class="text-left border rounded-3xl p-5 transition-all ${d.service?.id === srv.id ? 'border-primary bg-rose-50 ring-1 ring-rose-200' : 'border-stone-100 hover:border-rose-200'}"><div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-primary shadow-sm mb-3"><i data-lucide="${srv.icon}" class="w-5 h-5"></i></div><p class="text-stone-800 text-lg font-display font-semibold">${srv.name}</p></button>`).join('')}</div>`; }
      else if (s === 1) { canNext = d.staff !== null; const av = d.service ? STAFF.filter(stf => stf.tags.includes(d.service.id)) : STAFF; b = av.length === 0 ? `<p class="text-stone-400 text-center py-10">Uygun uzman bulunmuyor.</p>` : `<div class="grid sm:grid-cols-2 gap-4">${av.map(stf => `<button onclick="setBookingStaff(${stf.id})" class="text-left border rounded-3xl p-5 flex items-center gap-4 transition-all ${d.staff?.id === stf.id ? 'border-primary bg-rose-50 ring-1 ring-rose-200' : 'border-stone-100 hover:border-rose-200'}"><div class="w-14 h-14 rounded-full bg-white flex items-center justify-center text-rose-300 shadow-sm"><i data-lucide="user" class="w-6 h-6"></i></div><div><p class="text-stone-800 text-lg font-display font-semibold">${stf.name}</p><p class="text-xs text-stone-500 mt-1">${stf.title}</p></div></button>`).join('')}</div>`; }
      else if (s === 2) { canNext = d.time !== null; b = `<div><p class="text-xs uppercase tracking-widest text-stone-400 mb-4 font-semibold text-center">${formatDate(SYSTEM_TODAY)} - Müsait Saatler</p><div class="grid grid-cols-3 gap-3">${["09:00","10:30","12:00","14:00","15:30","17:00"].map(t => `<button onclick="setBookingTime('${t}')" class="py-3.5 rounded-2xl text-sm border transition-all font-medium ${d.time === t ? 'bg-primary border-primary text-white shadow-md' : 'border-stone-200 text-stone-600 hover:border-rose-300'}">${t}</button>`).join('')}</div></div>`; }
      else if (s === 3) { canNext = d.name.length > 2 && d.phone.length > 9; b = `<div class="space-y-5"><div class="bg-rose-50 rounded-3xl p-6 border border-rose-100"><p class="font-display text-xl text-stone-800 mb-2">${d.service.name}</p><p class="text-sm text-stone-500 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-primary"></i> ${d.staff.name}</p><p class="text-sm text-stone-500 flex items-center gap-2 mt-1"><i data-lucide="clock" class="w-4 h-4 text-primary"></i> ${formatDate(SYSTEM_TODAY)} ${d.time}</p></div><div><label class="text-xs font-semibold uppercase tracking-wider text-stone-500 mb-2 block ml-1">Adınız Soyadınız</label><input type="text" oninput="handleInput('name', this)" value="${d.name}" class="w-full border border-stone-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary bg-stone-50/50"></div><div><label class="text-xs font-semibold uppercase tracking-wider text-zinc-500 mb-2 block ml-1">Telefon Numaranız</label><input type="tel" oninput="handleInput('phone', this)" value="${d.phone}" class="w-full border border-stone-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary bg-stone-50/50"></div></div>`; }
      return `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4 py-8"><div class="bg-white rounded-[2rem] w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden"><div class="p-6 border-b border-stone-100 flex items-center justify-between"><h3 class="text-2xl text-stone-800 font-display font-semibold">Randevu Oluştur</h3><button onclick="closeBooking()" class="text-stone-400 hover:text-primary transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button></div><div class="flex px-8 pt-8 gap-3">${["Hizmet", "Uzman", "Zaman", "Bilgiler"].map((l, i) => `<div class="flex-1"><div class="h-1.5 rounded-full ${i <= s ? 'bg-primary' : 'bg-stone-100'}"></div><p class="text-[10px] mt-2 font-medium uppercase tracking-widest ${i === s ? 'text-primary' : 'text-stone-400'}">${l}</p></div>`).join('')}</div><div class="p-8 overflow-y-auto flex-1">${b}</div><div class="p-6 border-t border-stone-100 flex justify-between bg-stone-50/50"><button onclick="prevBookingStep()" class="px-6 py-3 rounded-full text-stone-500 font-medium ${s === 0 ? 'invisible' : 'hover:bg-white border border-stone-200'}">Geri Dön</button><button id="confirm-btn" onclick="nextBookingStep()" ${!canNext ? 'disabled' : ''} class="bg-primary hover-bg-primary disabled:opacity-40 text-white px-10 py-3 rounded-full transition-colors font-medium shadow-md">${s === 3 ? 'Onayla' : 'Devam Et'}</button></div></div></div>`;
    }

    // --- ADMİN PANELİ ---
    function renderAdminLogin() {
      return `<div class="min-h-screen bg-stone-900 flex items-center justify-center px-6 relative z-10"><div class="bg-white rounded-[2rem] p-10 max-w-sm w-full shadow-2xl"><div class="w-16 h-16 rounded-full bg-rose-50 text-primary flex items-center justify-center mb-6"><i data-lucide="lock-keyhole" class="w-7 h-7"></i></div><h2 class="text-3xl text-stone-800 font-display font-semibold mb-1">Yönetim Paneli</h2><p class="text-sm text-stone-400 mb-8">Kurumsal Giriş</p><form onsubmit="loginAdmin(event)" class="space-y-5"><div><label class="text-xs font-semibold uppercase tracking-wider text-stone-500 block mb-2">E-posta</label><input id="adminEmail" type="email" required class="w-full border border-stone-200 rounded-2xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-primary" value="admin@bellerose.com"></div><div><label class="text-xs font-semibold uppercase tracking-wider text-stone-500 block mb-2">Şifre</label><input id="adminPass" type="password" required class="w-full border border-stone-200 rounded-2xl px-4 py-3.5 focus:outline-none focus:ring-1 focus:ring-primary" value="bellerose2026"></div><button type="submit" class="w-full bg-primary hover-bg-primary text-white py-3.5 rounded-2xl font-medium transition-colors shadow-md mt-2">Giriş Yap</button></form></div></div>`;

        { id: 'settings', label: 'Site Ayarları', icon: 'settings-2' }

            <div class="bg-white rounded-3xl p-6 border border-rose-50 shadow-sm">
              <div class="flex justify-between items-start mb-4">

          <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white rounded-3xl border border-rose-50 p-6 shadow-sm">

            <div class="bg-white rounded-3xl border border-rose-50 p-6 shadow-sm">

        content = `
          <h2 class="text-3xl text-stone-800 font-display font-semibold mb-8">Güne Başla - Günlük Randevu Planı</h2>
          <div class="grid gap-4">
            ${todayApts.length === 0 ? `<div class="bg-white p-10 rounded-3xl text-center border border-rose-50 shadow-sm"><i data-lucide="check-circle-2" class="w-12 h-12 text-green-400 mx-auto mb-4"></i><p class="text-stone-500 font-medium">Bugün tamamlanmayı bekleyen herhangi bir aktif işlem yok.</p></div>` : todayApts.map(a => `
              <div class="bg-white border-l-4 border-primary rounded-2xl p-6 shadow-sm flex items-center justify-between">
                <div class="flex gap-6 items-center">

      // 3. TÜM RANDEVULAR
      else if (state.adminTab === 'appointments') {

            <select onchange="updateFilter('aptStaff', this.value)" class="border border-stone-200 rounded-xl px-4 py-2.5 text-sm bg-stone-50 focus:outline-none"><option value="">Tüm Uzmanlar</option>${STAFF.map(s => `<option value="${s.name}">${s.name}</option>`).join('')}</select>
            <select onchange="updateFilter('aptService', this.value)" class="border border-stone-200 rounded-xl px-4 py-2.5 text-sm bg-stone-50 focus:outline-none"><option value="">Tüm İşlemler</option>${SERVICES.map(s => `<option value="${s.name}">${s.name}</option>`).join('')}</select>

          <div class="bg-white rounded-3xl border border-rose-50 shadow-sm overflow-hidden">
            <table class="w-full text-sm text-left"><thead class="bg-stone-50 text-stone-500 text-xs uppercase font-semibold border-b border-stone-100"><tr><th class="px-6 py-5">Zaman</th><th class="px-6 py-5">Müşteri</th><th class="px-6 py-5">Hizmet Detayı</th><th class="px-6 py-5">Durum</th><th class="px-6 py-5 text-right">İşlemler</th></tr></thead><tbody class="divide-y divide-stone-50">
                ${filteredApts.map(a => `
                  <tr class="hover:bg-rose-50/30 transition-colors">
                    <td class="px-6 py-4 text-stone-600 font-medium">${formatDate(a.date)}<br><span class="text-xs text-primary font-semibold">${a.time}</span></td>

                    <td class="px-6 py-4 text-right flex gap-1.5 justify-end">
                      ${(!a.status.includes('Ödendi') && !a.status.includes('Tamamlandı') && !a.status.includes('İptal')) ? `
                        <button onclick="state.activeId=${a.id}; state.modals.payment=true; render()" class="text-[11px] font-semibold text-white bg-green-500 px-3 py-1.5 rounded-lg shadow-sm">Ödeme Al</button>
                        <button onclick="state.activeId=${a.id}; state.modals.postpone=true; render()" class="text-[11px] font-semibold text-stone-700 bg-stone-100 border border-stone-200 px-3 py-1.5 rounded-lg">Zamanı Değiştir</button>
                        <button onclick="cancelAppointment(${a.id})" class="text-[11px] font-semibold text-red-600 bg-red-50 px-3 py-1.5 rounded-lg hover:bg-red-100">İptal Et</button>

            </tbody></table>
          </div>
        `;
      }
      // 4. KASA & GİDER
      else if (state.adminTab === 'finance') {
        let filteredTrans = TRANSACTIONS;
        if(state.filters.financeType !== 'all') filteredTrans = filteredTrans.filter(t => t.type === state.filters.financeType);
        if(state.filters.financeDate !== 'all') {
           filteredTrans = filteredTrans.filter(t => {
               const daysDiff = getDateDiffDays(SYSTEM_TODAY, t.date);
               if(state.filters.financeDate === '1d') return daysDiff <= 1;
               if(state.filters.financeDate === '3d') return daysDiff <= 3;
               if(state.filters.financeDate === '1w') return daysDiff <= 7;
               if(state.filters.financeDate === '1m') return daysDiff <= 30;
               return true;
           });

        content = `

          <div class="flex flex-wrap gap-4 mb-6 bg-white p-4 rounded-2xl border border-rose-50 shadow-sm">

                ${filteredTrans.map(t => `<tr class="hover:bg-rose-50/30 transition-colors"><td class="px-6 py-4 text-stone-500">${formatDate(t.date)}</td><td class="px-6 py-4 font-medium text-stone-800">${t.desc}</td><td class="px-6 py-4 text-stone-400 text-xs uppercase tracking-wider">${t.method}</td><td class="px-6 py-4 text-right font-bold text-lg ${t.type==='income'?'text-green-600':'text-red-500'}">${t.type==='income'?'+':'-'} ${t.amount} ₺</td></tr>`).join('')}

          </div>

          </tbody></table></div>
        `;

      // 6. HİZMETLER
      else if (state.adminTab === 'services') {
        content = `
          <div class="flex items-center justify-between mb-8"><h2 class="text-3xl text-stone-800 font-display font-semibold">Hizmetler</h2><button onclick="state.modals.addService=true; render()" class="bg-primary text-white px-6 py-3 rounded-2xl text-sm flex items-center gap-2 font-medium shadow-md"><i data-lucide="plus" class="w-4 h-4"></i> Hizmet Ekle</button></div>
          <div class="grid gap-4">${SERVICES.map(s => `
            <div class="bg-white border border-rose-50 rounded-2xl p-6 shadow-sm flex items-center justify-between hover:border-rose-200 transition-colors">
              <div class="flex items-center gap-5"><div class="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center text-primary shrink-0"><i data-lucide="${s.icon}" class="w-5 h-5"></i></div><div><p class="text-stone-800 font-display text-xl font-semibold">${s.name}</p><p class="text-sm text-stone-500 mt-1">${s.category} · ${s.duration} dk</p></div></div>
              <div class="flex items-center gap-6"><div class="text-right"><p class="text-xs text-stone-400 font-medium uppercase tracking-wider mb-1">Fiyat Aralığı</p><p class="font-semibold text-stone-800">${s.priceMin} - ${s.priceMax} ₺</p></div><button onclick="deleteService(${s.id})" class="text-red-500 hover:text-red-700 bg-red-50 p-3 rounded-xl transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>
            </div>
          `).join('')}</div>
        `;
      }
      // 7. UZMANLAR
      else if (state.adminTab === 'staff') {
        content = `
          <div class="flex items-center justify-between mb-8"><h2 class="text-3xl text-stone-800 font-display font-semibold">Uzman Kadrosu</h2><button onclick="state.modals.addStaff=true; render()" class="bg-primary text-white px-6 py-3 rounded-2xl text-sm flex items-center gap-2 font-medium shadow-md"><i data-lucide="plus" class="w-4 h-4"></i> Yeni Uzman Ekle</button></div>
          <div class="grid md:grid-cols-2 gap-6">${STAFF.map(stf => `<div class="bg-white border border-rose-50 rounded-3xl p-6 shadow-sm flex items-start gap-5"><div class="w-16 h-16 rounded-full bg-rose-50 flex items-center justify-center text-primary shrink-0"><i data-lucide="user" class="w-7 h-7"></i></div><div><p class="text-zinc-900 font-display text-2xl font-semibold">${stf.name}</p><p class="text-sm text-stone-500 font-medium mt-1">${stf.title}</p><div class="mt-4 flex flex-wrap gap-2">${stf.tags.map(tagId => SERVICES.find(s => s.id === tagId)?.name).filter(Boolean).map(srv => `<span class="px-3 py-1 bg-stone-50 border border-stone-100 text-stone-600 rounded-full text-[10px] uppercase font-semibold tracking-wider">${srv}</span>`).join('')}</div></div></div>`).join('')}</div>
        `;
      }
      // 8. SİTE AYARLARI
      else if (state.adminTab === 'settings') {
        content = `
          <h2 class="text-3xl text-stone-800 font-display font-semibold mb-8">Sistem & Profil Ayarları</h2>
          <div class="flex gap-6 mb-8 border-b border-stone-200">
            <button onclick="setSettingsTab('contact')" class="pb-3 text-sm font-semibold uppercase tracking-wider ${state.settingsTab==='contact'?'text-primary border-b-2 border-primary':'text-stone-400'}">İletişim Bilgileri</button>
            <button onclick="setSettingsTab('gallery')" class="pb-3 text-sm font-semibold uppercase tracking-wider ${state.settingsTab==='gallery'?'text-primary border-b-2 border-primary':'text-stone-400'}">Galeri Görüntüleri</button>
            <button onclick="setSettingsTab('users')" class="pb-3 text-sm font-semibold uppercase tracking-wider ${state.settingsTab==='users'?'text-primary border-b-2 border-primary':'text-stone-400'}">Personel Hesapları</button>
          </div>
        `;
        if(state.settingsTab === 'contact') {
          content += `<form onsubmit="saveContactInfo(event)" class="bg-white rounded-3xl p-8 border border-rose-50 shadow-sm max-w-2xl space-y-5"><div class="grid grid-cols-2 gap-5"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Telefon</label><input id="cPhone" value="${state.contact.phone}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary text-sm"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">E-posta</label><input id="cEmail" value="${state.contact.email}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary text-sm"></div></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Adres</label><input id="cAddress" value="${state.contact.address}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary text-sm"></div><div class="grid grid-cols-2 gap-5"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Instagram</label><input id="cInsta" value="${state.contact.instagram}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary text-sm"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Facebook</label><input id="cFace" value="${state.contact.facebook}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none focus:ring-1 focus:ring-primary text-sm"></div></div><button type="submit" class="bg-primary text-white px-10 py-4 rounded-full font-medium mt-4 shadow-md">Ayarları Kaydet</button></form>`;
        } else if(state.settingsTab === 'gallery') {
          content += `<form onsubmit="saveGalleryInfo(event)" class="bg-white rounded-3xl p-8 border border-rose-50 shadow-sm max-w-2xl space-y-5"><p class="text-sm text-stone-500 mb-4">Görsellerin tam bağlantı (URL) adreslerini giriniz.</p><input id="g1" value="${state.gallery[0]}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none text-sm"><input id="g2" value="${state.gallery[1]}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none text-sm"><input id="g3" value="${state.gallery[2]}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none text-sm"><input id="g4" value="${state.gallery[3]}" class="w-full border border-stone-200 bg-stone-50 rounded-2xl px-5 py-4 focus:outline-none text-sm"><button type="submit" class="bg-primary text-white px-10 py-4 rounded-full font-medium mt-4 shadow-md">Görselleri Güncelle</button></form>`;
        } else {
          content += `
            <div class="flex items-center justify-between mb-6"><h3 class="text-xl text-stone-800 font-display font-semibold">Sistem Personel Girişleri</h3><button onclick="state.modals.addUser=true; render()" class="bg-stone-800 text-white px-5 py-2.5 rounded-xl text-sm flex items-center gap-2 font-medium"><i data-lucide="user-plus" class="w-4 h-4"></i> Personel Hesabı Ekle</button></div>
            <div class="bg-white rounded-3xl border border-rose-50 shadow-sm overflow-hidden"><table class="w-full text-sm text-left"><thead class="bg-stone-50 text-stone-500 text-xs uppercase font-semibold border-b border-stone-100"><tr><th class="px-6 py-5">Personel Adı</th><th class="px-6 py-5">Erişim Yetkileri (Sayfalar)</th></tr></thead><tbody class="divide-y divide-stone-50">
                ${USERS.map(u => `<tr class="hover:bg-rose-50/30"><td class="px-6 py-5"><p class="font-semibold text-stone-800">${u.name}</p><p class="text-xs text-stone-500 mt-1">${u.email} <span class="text-rose-400 ml-2">(${u.role})</span></p></td><td class="px-6 py-5"><div class="flex flex-wrap gap-2">${u.permissions.map(p => { const tl = allTabs.find(t=>t.id===p); return tl ? `<span class="px-2.5 py-1 bg-rose-50 text-primary rounded text-[10px] uppercase font-bold tracking-wider">${tl.label}</span>` : ''; }).join('')}</div></td></tr>`).join('')}
            </tbody></table></div>
          `;
        }
      }

      return `
        <div class="flex bg-[#fdf2f8] min-h-screen relative z-10">
          <aside class="w-72 bg-white border-r border-rose-100 min-h-screen flex flex-col fixed left-0 top-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-20 overflow-y-auto">
            <div class="p-8 flex items-center gap-3 border-b border-rose-50"><div class="w-10 h-10 rounded-full bg-rose-50 text-primary flex items-center justify-center"><i data-lucide="flower-2" class="w-6 h-6"></i></div><span class="text-2xl text-stone-800 font-display font-semibold tracking-wide">Belle<span class="text-primary italic">Rose</span></span></div>
            <nav class="flex-1 px-4 py-6 space-y-2">
              ${tabs.map(t => `<button onclick="setAdminTab('${t.id}')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl text-sm transition-all ${state.adminTab === t.id ? 'bg-primary text-white shadow-md font-medium' : 'text-stone-500 hover:bg-rose-50 hover:text-primary'}"><i data-lucide="${t.icon}" class="w-5 h-5"></i> ${t.label}</button>`).join('')}
            </nav>
            <div class="p-6 border-t border-rose-50"><button onclick="logoutAdmin()" class="w-full flex items-center justify-center gap-3 px-5 py-4 text-sm text-rose-400 hover:bg-rose-50 transition-colors rounded-2xl font-medium"><i data-lucide="log-out" class="w-5 h-5"></i> Çıkış Yap</button></div>
          </aside>
          <main class="flex-1 ml-72 p-10 lg:p-14 max-w-7xl pb-20">${content}</main>
        </div>
      `;
    }

    // --- MODALLAR ---
    function renderModals() {
      let m = '';
      if(state.modals.postpone) {
        const apt = APPOINTMENTS.find(a => a.id === state.activeId);
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-sm w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-2">Zamanı Değiştir</h3><p class="text-sm text-stone-500 mb-6">${apt.customer} <br><span class="text-xs">${apt.service}</span></p><form onsubmit="savePostpone(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Yeni Tarih</label><input id="pDate" type="date" required value="${apt.date}" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 text-sm bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Yeni Saat</label><input id="pTime" type="time" required value="${apt.time}" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 text-sm bg-stone-50"></div><div class="flex gap-3 mt-8"><button type="button" onclick="state.modals.postpone=false; render()" class="flex-1 py-3.5 text-sm font-medium text-stone-500 bg-stone-100 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-blue-500 rounded-2xl shadow-md">Zamanı Kaydet</button></div></form></div></div>`;
      }
      if(state.modals.payment) {
        const apt = APPOINTMENTS.find(a => a.id === state.activeId); const srv = SERVICES.find(s => s.name === apt.service);
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-sm w-full"><div class="w-14 h-14 rounded-full bg-green-50 text-green-500 flex items-center justify-center mb-4"><i data-lucide="banknote" class="w-6 h-6"></i></div><h3 class="text-2xl text-stone-800 font-display font-semibold mb-2">Ödeme Al</h3><p class="text-sm text-stone-500 mb-6">${apt.customer} - ${apt.service}</p><form onsubmit="savePayment(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Tahsil Edilen Tutar (₺)</label><input id="payAmount" type="number" required value="${srv ? srv.priceMin : 0}" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Ödeme Yöntemi</label><select id="payMethod" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50"><option>Kredi Kartı</option><option>Nakit</option><option>Havale/EFT</option></select></div><div class="flex gap-3 mt-8"><button type="button" onclick="state.modals.payment=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 rounded-2xl text-stone-500">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-green-500 rounded-2xl shadow-md">Tamamla</button></div></form></div></div>`;
      }
      if(state.modals.addStock) {
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-sm w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">Stok Ekle</h3><form onsubmit="saveStock(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Ürün Adı</label><input id="iName" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Miktar</label><input id="iStock" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Birim</label><input id="iUnit" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Kritik Uyarı</label><input id="iMin" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Birim Maliyet</label><input id="iCost" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addStock=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-primary rounded-2xl shadow-md">Kaydet</button></div></form></div></div>`;
      }
      if(state.modals.addService) {
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-md w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">Yeni Hizmet Ekle</h3><form onsubmit="saveService(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Hizmet Adı</label><input id="sName" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Kategori</label><input id="sCat" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Süre (Dk)</label><input id="sDur" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Min Fiyat (₺)</label><input id="sMin" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Max Fiyat (₺)</label><input id="sMax" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addService=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-primary rounded-2xl shadow-md">Kaydet</button></div></form></div></div>`;
      }
      if(state.modals.addFinance) {
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-sm w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">Finansal İşlem Ekle</h3><form onsubmit="saveFinance(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">İşlem Türü</label><select id="fType" class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"><option value="income">Gelir</option><option value="expense">Gider</option></select></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Açıklama</label><input id="fDesc" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Tutar (₺)</label><input id="fAmount" type="number" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Yöntem</label><select id="fMethod" class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"><option>Nakit</option><option>Kredi Kartı</option><option>Havale</option></select></div></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addFinance=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-primary rounded-2xl shadow-md">Kaydet</button></div></form></div></div>`;
      }
      if(state.modals.addStaff) {
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-xl w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">Yeni Uzman Ekle</h3><form onsubmit="saveStaff(event)" class="space-y-5"><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Ad Soyad</label><input id="newStaffName" required type="text" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Unvan / Meslek</label><input id="newStaffTitle" required type="text" class="w-full border border-stone-200 rounded-2xl px-5 py-3.5 bg-stone-50"></div></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-3">Uzmanlık Alanları (Hizmet Seçimi)</label><div class="grid grid-cols-2 gap-3 p-5 bg-rose-50/50 rounded-2xl border border-rose-100">${SERVICES.map(s => `<label class="flex items-center gap-3 text-sm text-stone-700 cursor-pointer"><input type="checkbox" value="${s.id}" class="service-checkbox w-4 h-4 accent-primary"> ${s.name}</label>`).join('')}</div></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addStaff=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-primary rounded-2xl shadow-md">Uzmanı Kaydet</button></div></form></div></div>`;
      }
      if(state.modals.addUser) {
        const adminTabs = [{id:'overview',l:'Genel Bakış'},{id:'startDay',l:'Güne Başla'},{id:'appointments',l:'Randevular'},{id:'finance',l:'Kasa/Gelir'},{id:'inventory',l:'Stok'},{id:'services',l:'Hizmetler'},{id:'staff',l:'Uzmanlar'},{id:'settings',l:'Ayarlar'}];
        m += `<div class="fixed inset-0 z-50 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center px-4"><div class="bg-white rounded-[2rem] p-8 max-w-lg w-full"><h3 class="text-2xl text-stone-800 font-display font-semibold mb-6">Personel Hesabı Oluştur</h3><form onsubmit="saveUser(event)" class="space-y-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Kullanıcı Adı</label><input id="newUName" required class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div class="grid grid-cols-2 gap-4"><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Giriş E-postası</label><input id="newUEmail" required type="email" class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-2">Şifre</label><input id="newUPass" required type="text" class="w-full border border-stone-200 rounded-2xl px-5 py-3 bg-stone-50"></div></div><div><label class="text-[10px] font-semibold text-stone-500 uppercase tracking-widest block mb-3">Erişim İzinleri (Sayfalar)</label><div class="grid grid-cols-2 gap-3 p-5 bg-rose-50/50 rounded-2xl border border-rose-100">${adminTabs.map(t => `<label class="flex items-center gap-3 text-sm text-stone-700 cursor-pointer"><input type="checkbox" value="${t.id}" class="perm-checkbox w-4 h-4 accent-rose-500"> ${t.l}</label>`).join('')}</div></div><div class="flex gap-3 mt-6"><button type="button" onclick="state.modals.addUser=false; render()" class="flex-1 py-3.5 text-sm font-medium bg-stone-100 text-stone-500 rounded-2xl">İptal</button><button type="submit" class="flex-1 py-3.5 text-sm font-medium text-white bg-stone-800 rounded-2xl shadow-md">Oluştur</button></div></form></div></div>`;
      }
      return m;
    }

    render();
  </script>
</body>
</html>
